openapi: 3.0.1
info:
  title: claim-server
  description: ' 클레임(claim) 관련 server API입니다.'
  version: unspecified
servers:
  - url: https://server-api.e-ncp.com
tags:
  - name: Claim
    description: 클레임
  - name: OptionCancel
    description: 부분취소
  - name: Return
    description: 반품
paths:
  /cancel-exchanges:
    post:
      tags:
        - CancelExchange
      summary: 취소교환 신청
      description: |2+

        ## 부가설명 및 특이사항
        옵션 취소 교환을 신청하는 API입니다.

      operationId: post-cancel-exchanges
      parameters:
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: false
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br />\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니\
            다.<br />\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n\n\
            \ ^|각 어드민에서 복사된 값"
          required: false
          schema:
            type: string
          example: test-mall-key
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cancel-exchanges1646626756'
            examples:
              post-cancel-exchanges:
                value: "{\"calculateParam\":{\"orderNo\":\"202001100000000001\",\"\
                  cancelOrderOptionNo\":1,\"cancelCnt\":1,\"exchangeProductNo\":1,\"\
                  exchangeOptionNo\":1,\"exchangeCnt\":1,\"responsibleObjectType\"\
                  :\"BUYER\",\"sellerPaysClaimedDelivery\":false,\"productAdjustAmt\"\
                  :0,\"refundType\":\"PG\",\"complexRefundAdjust\":null},\"additionalPayType\"\
                  :null,\"reasonDetail\":\"test\",\"reasonType\":\"CHANGE_MIND\",\"\
                  refundBankAccount\":null,\"additionalPayBankAccount\":null,\"purchaserInputs\"\
                  :[{\"inputLabel\":\"test label\",\"inputValue\":\"test value\"}],\"\
                  additionalPayRemitter\":null,\"productAdjustReason\":null}"
      responses:
        '204':
          description: '204'
