  /claims/{claimNo}/already-delivery:
    put:
      tags:
        - Claim
      summary: 이미출고
      description:
        "\n## 부가설명 및 특이사항\n옵션취소, 취소교환 신청된 클레임의 배송이 이미 출고된 경우 호출합니다.\n신청\
        된 클레임을 철회하고, 배송정보를 저장하여 배송중 상태로 변경합니다.\n    "
