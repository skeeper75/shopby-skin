  /claims:
    get:
      tags:
        - Claim
      summary: 클레임 목록 조회하기
      description: |2

        ## 부가설명 및 특이사항
        다수의 클레임 정보를 조회합니다.

        ## 클레임 상태 값 정의
        - ## 취소
            |상태 값|한글 정의|
            |---|---|
            |CANCEL_NO_REFUND|취소완료[환불없음]|
            |CANCEL_REQUEST|취소신청[승인대기]|
            |CANCEL_PROC_REQUEST_REFUND|취소처리[환불보류]|
            |CANCEL_PROC_WAITING_REFUND|취소처리[환불대기]|
            |CANCEL_DONE|취소완료[환불완료]|

        - ## 교환
            |상태 값|한글 정의|
            |---|---|
            |EXCHANGE_REQUEST|교환신청[승인대기]|
            |EXCHANGE_REJECT_REQUEST|교환처리[철회대기]|
            |EXCHANGE_PROC_BEFORE_RECEIVE|교환처리[수거진행]|
            |EXCHANGE_PROC_REQUEST_PAY|교환처리[결제대기]|
            |EXCHANGE_PROC_REQUEST_REFUND|교환처리[환불보류]|
            |EXCHANGE_PROC_WAITING|교환처리[처리대기]|
            |EXCHANGE_PROC_WAITING_PAY|교환처리[입금처리대기]|
            |EXCHANGE_PROC_WAITING_REFUND|교환처리[환불대기]|
            |EXCHANGE_DONE_PAY_DONE|교환완료[결제완료]|
            |EXCHANGE_DONE_REFUND_DONE|교환완료[환불완료]|
            |EXCHANGE_DONE|교환완료[차액없음]|

        - ## 반품
            |상태 값|한글 정의|
            |---|---|
            |RETURN_NO_REFUND|반품완료[환불없음]|
            |RETURN_REQUEST|반품신청[승인대기]|
            |RETURN_REJECT_REQUEST|반품신청[철회대기]|
            |RETURN_PROC_BEFORE_RECEIVE|반품처리[수거진행]|
            |RETURN_PROC_REQUEST_REFUND|반품처리[환불보류]|
            |RETURN_PROC_WAITING_REFUND|반품처리[환불대기]|
            |RETURN_DONE|반품완료[환불완료]|
            |RETURN_REFUND_AMT_ADJUST_REQUESTED|반품처리[조정요청]|
      operationId: get-claims
      parameters:
        - name: claimStatusTypes
          in: query
          description: '클레임 상태 리스트^|CANCEL_REQUEST, CANCEL_DONE'
          required: false
          schema:
            type: string
        - name: endYmd
          in: query
          description: 조회종료일^|yyyy-mm-dd
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: 페이지 번호 (1 이상)^|1
          required: true
          schema:
            type: string
        - name: searchDateType
          in: query
          description: '검색일자타입(APPLY_YMDT: 클레임일자, COMPLETE_YMDT: 클레임완료일자)^|APPLY_YMDT'
          required: true
          schema:
            type: string
        - name: searchType
          in: query
          description:
            "클레임 검색 타입(ALL: 전체, CLAIM_NO: 클레임번호, ORDER_NO: 주문번호, MEMBER_NO:\
            \ 회원번호)^|ORDER_NO"
          required: true
          schema:
            type: string
        - name: searchValues
          in: query
          description: '클레임 검색 값^|1,2,3'
          required: false
          schema:
            type: string
        - name: size
          in: query
          description: 페이지 사이즈^|30
          required: true
          schema:
            type: string
        - name: startYmd
          in: query
          description: 조회시작일^|yyyy-mm-dd
          required: true
          schema:
            type: string
        - name: treatmentStatusTypes
          in: query
          description: '클레임 처리 상태 리스트^|WITHDRAW, WITHDRAW_APPROVE'
          required: false
          schema:
            type: string
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: false
          schema:
