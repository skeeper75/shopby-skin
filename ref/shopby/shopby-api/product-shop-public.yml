            type: string
          example: PC
        - name: language
          in: header
          description: '언어 (기본값: ko, 지원: en - 영어, jp - 일본어, zh - 중국어) (nullable)'
          required: false
          schema:
            type: string
          example: en
        - name: accessToken
          in: header
          description: 회원 엑세스 토큰 - (accessToken 또는 Shop-By-Authorization 중 하나는 필수)
          required: false
          schema:
            type: string
          example: test-access-token
        - name: Shop-By-Authorization
          in: header
          description: 액세스 토큰(Oauth2 스펙) - (accessToken 또는 Shop-By-Authorization 중 하나는
            필수)
          required: false
          schema:
            type: string
          example: Bearer test-access-token
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/profile-like-products504560329'
              examples:
                get-profile-like-products:
                  value: "{\"items\":[{\"productNo\":10000001,\"productName\":\"상품\
                    명\",\"productNameEn\":\"\",\"partnerName\":\"다팔아\",\"promotionText\"\
                    :\"홍보문구\",\"salePrice\":10000,\"immediateDiscountAmt\":1000,\"\
                    immediateDiscountUnitType\":\"WON\",\"immediateDiscountStartYmdt\"\
                    :\"2025-10-28T11:09:55.191482869\",\"immediateDiscountEndYmdt\"\
                    :\"2025-11-28T11:09:55.191489596\",\"additionDiscountAmt\":1000,\"\
                    additionDiscountUnitType\":\"WON\",\"minSalePrice\":1000,\"maxSalePrice\"\
                    :100000,\"maxDiscountAmount\":0,\"liked\":false,\"likeCount\"\
                    :10,\"reviewRating\":4.8,\"totalReviewCount\":8,\"deliveryConditionType\"\
                    :\"CONDITIONAL\",\"saleCnt\":1000,\"stockCnt\":100,\"mainStockCnt\"\
                    :50,\"brandNo\":10,\"brandName\":\"더미 브랜드\",\"brandNameEn\":\"\
                    dummy brand\",\"brandNameKo\":\"dummy korean brand\",\"stickerInfos\"\
                    :[{\"type\":\"TEXT\",\"label\":\"스티커라벨\",\"no\":10}],\"stickerLabels\"\
