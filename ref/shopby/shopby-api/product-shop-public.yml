          required: true
          schema:
            type: string
          example: PC
        - name: language
          in: header
          description: '언어 (기본값: ko, 지원: en - 영어, jp - 일본어, zh - 중국어) (nullable)'
          required: false
          schema:
            type: string
          example: en
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/display-brands-extraInfo-1018337533'
              examples:
                get-display-brand-extra-info:
                  value: '[{"displayBrandNo":1,"extraInfo":"ExtraInfo"}]'
  /display/brands/search:
