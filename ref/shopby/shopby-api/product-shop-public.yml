            김처리 시, front에서 [-999]로 표시되도록 처리되고 있는게 있다면 재고노출여부(displayableStock)를 기준\
            으로 수정 작업이 필요합니다.    \n   만약 재고 숨김처리 시, front에서 [품절]로 표시되도록 처리되고 있는게 있다\
