      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/profile-recent-products332560431'
              examples:
                get-guest-recent-products:
                  value: "[{\"optionValues\":[{\"mallProductNo\":10000001,\"optionValue\"\
                    :\"레드\",\"stockCnt\":100}],\"displayableStock\":true,\"recentlyViewedYmdt\"\
