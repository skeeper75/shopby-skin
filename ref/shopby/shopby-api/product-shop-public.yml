      parameters:
        - name: displayBrandNo
          in: path
          description: 전시브랜드 번호
          required: true
          schema:
            type: string
          example: '1'
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디
