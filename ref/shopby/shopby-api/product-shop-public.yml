  /products/bundle-shipping:
    get:
      tags:
        - Product
      summary: 묶음 배송 상품 목록 조회하기
      description:
        "## 부가설명 및 특이사항\n            \n묶음 배송 상품 목록 조회하는 API입니다\n\nhasBrandAndCategoryValues는\
        \ 되도록 false로 설정해주세요.(성능 이슈)\n\n ### OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n    \n\
        ## [상품 금액 적용]\n### 기본 상품 판매가\n* 옵션이 없는 상품\n  * 상품 등록 시, 기입한 판매가 그대로 적용\n*\
        \ 옵션이 있는 상품\n  * 상품 등록 시, 기입한 판매가 + 옵션가 적용\n  * 예\\) A상품\\(판매가10000원\\)에 옵\
        션 1\\(\\+0원\\) \\| 옵션2\\(\\+1000원\\) 인 경우\\|\\, 옵션1 구매가격은 10000원 옵션2 구매가격은\
        \ 11000원\n* 세트 상품\n  * 세트 상품의 옵션에 구성된 옵션(옵션있는 상품들의 옵션으로 세트 옵션 구성)의 구매가격의 합\
        \n  * 세트 옵션 구성이 달라질 수 있기때문에 당연히 옵션마다 가격 상이 함\n\n### 즉시 할인\n* 옵션이 없는 상품\n \
        \ * 판매가에 즉시할인이 적용된 가격\n* 옵션있는 상품\\, 세트 상품\n  * 판매가에 즉시할인이 적용된 가격 + 옵션가 가 최\
        종 가격\n  * 예\\) A상품\\(판매가10000원\\)에 옵션 1\\(\\+0원\\) \\| 옵션2\\(\\+1000원\\) \\\
        | 옵션3\\(\\+2000원\\) 이고 즉시 할인율 10% 인 경우\\,\n    옵션별 가격은 판매가 \\*0.8 + 옵션가 이므\
        로 따라서\n    옵션 1 의 판매가격은 9000원, 옵션 2의 판매가격은 10000원, 옵션3의 판매가격은 11000원\n   \
        \ \n\\* **옵션가격에서 즉시 할인이 적용 되는 것이 아님**\n\n### 추가 할인\n* 할인 적용 순서 : 즉시 할인 ->\
        \ 추가 할인\n* 즉시 할인 적용 된 판매가격에 추가 할인 적용\n  * 예) 10000원 상품에 즉시 할인으로 1000원일 할인된\
        다면, 9000원에서 추가 할인 설정에 따라 할인 적용\n  \n**즉시 할인**과의 차이점이라면 적용되는 가격인데 즉시 할인의 경우\
        \ 상품을 등록 할 때에 입력한 판매가 적용하지만, **추가 할인**은 실제 해당 상품의 구매 가격에 적용 (상품등록 시에 판매가에\
        \ 적용되는 것이 아닌 실제 구매 금액에 적용)\n\n* 예) A상품(판매가15000원)\n\n    \\- 옵션 1\\(\\+0원\\\
        ) \\| 옵션2\\(\\+1000원\\) \\| 옵션3\\(\\+2000원\\)\n    \n    \\- 즉시 할인 : 5000원\
        \n    \n    \\- 추가 할인 : 10%\n    \n    옵션 1 구매가격 : ((15000-5000) + 0)\\*0.9\
        \ = 9000\n    \n    옵션 2 구매가격 : ((15000-5000) + 1000)\\*0.9 = 9900\n    \n\
        \    옵션 2 구매가격 : ((15000-5000) + 2000)\\*0.9 = 10800"
      operationId: 묶음 배송 상품 목록 조회
      parameters:
        - name: deliveryTemplateNo
          in: query
          description: 배송 템플릿 번호
          required: true
          schema:
            type: number
          example: '100'
        - name: hasOptionValues
          in: query
          description: '옵션값 출력 여부 (default : false) (nullable)'
          required: false
          schema:
            type: boolean
          example: 'true'
        - name: hasBrandAndCategoryValues
          in: query
          description: '브랜드/카테고리 출력 여부 (default : false) (nullable)'
          required: false
          schema:
            type: boolean
          example: 'true'
        - name: pageSize
          in: query
          description: '한 페이지당 노출 수 (default : 30) (nullable)'
          required: false
          schema:
            type: number
          example: '30'
        - name: pageNumber
          in: query
          description: '페이지 번호 (default : 1) (nullable)'
          required: false
          schema:
            type: number
          example: '1'
        - name: productSort.criterion
          in: query
          description: '정렬 기준 (default : RECENT_PRODUCT) (nullable)'
          required: false
          schema:
            type: string
          example: SALE_CNT
        - name: productSort.direction
          in: query
          description: '정렬 방법 (default : DESCDeliveryFeignClient) (nullable)'
          required: false
          schema:
            type: string
          example: DESC
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디
          required: true
          schema:
            type: string
          example: test-client-id
        - name: platform
          in: header
          description:
            "PC - PC 웹 브라우저에서 접근 시, MOBILE_WEB - 모바일 웹 브라우저에서 접근 시, AOS -\
            \ Android 앱에서 접근 시, IOS - iOS 앱에서 접근 시"
          required: true
          schema:
            type: string
          example: PC
        - name: language
          in: header
          description: '언어 (기본값: ko, 지원: en - 영어, jp - 일본어, zh - 중국어) (nullable)'
          required: false
          schema:
            type: string
          example: en
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/products-bundle-shipping-183018637'
              examples:
                묶음 배송 상품 목록 조회:
                  value: "{\"totalCount\":1,\"pageCount\":0,\"minPrice\":5000,\"maxPrice\"\
                    :5000,\"items\":[{\"productNo\":10000001,\"productName\":\"상품명\
                    \",\"productNameEn\":\"상품명 (en)\",\"partnerName\":\"다팔아\",\"promotionText\"\
                    :\"프로모션 문구\",\"salePrice\":5000,\"immediateDiscountAmt\":10,\"\
                    immediateDiscountUnitType\":\"RATE\",\"immediateDiscountStartYmdt\"\
                    :\"2025-10-28T11:10:15.48625704\",\"immediateDiscountEndYmdt\"\
                    :\"2025-10-28T11:10:15.48628411\",\"additionDiscountAmt\":1000,\"\
                    additionDiscountUnitType\":\"WON\",\"minSalePrice\":1000.00,\"\
                    maxSalePrice\":100000.00,\"maxDiscountAmount\":0,\"liked\":false,\"\
                    likeCount\":10,\"reviewRating\":4.8,\"totalReviewCount\":8,\"\
