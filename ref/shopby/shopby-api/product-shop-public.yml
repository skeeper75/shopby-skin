                    ,\"reservationEndYmdt\":\"2025-08-28T11:09:55.191431951\",\"reservationDeliveryYmdt\"\
                    :\"2025-09-28T11:09:55.191449278\",\"reservationStockCnt\":5},\"\
                    imageUrls\":[\"//shopby-images.cdn-nhncommerce.com/SERVICE/20191212/XYkrzmG.jpg\"\
