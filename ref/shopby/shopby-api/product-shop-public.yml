                    배송비 3,000원, 10000원 이상 무료 배송 (10000원 이상~20000원 이하 까지)\",\"deliveryFeeRanges\"\
                    :[{\"deliveryAmt\":3000,\"below\":20000,\"aboveOrEqual\":10000}],\"\
                    criteria\":10000,\"rangeSummaries\":[\"차등 조건 구간 요약\"],\"perOrderCnt\"\
                    :2},\"expirationDate\":null,\"minSalePrice\":1000.00,\"maxSalePrice\"\
                    :100000.00,\"brandNo\":10,\"partnerName\":\"다팔아\",\"liked\":false,\"\
