  /products/search/summary:
    get:
      tags:
        - Product
      summary: 상품 검색 결과 Summary 정보 조회(search engine)하기
      description:
        "## 부가설명 및 특이사항\n            \n상품 검색 결과의 Summary 정보만 응답하는 API입니\
        다\n\n* 상품 검색 결과의 Summary 정보를 제공합니다. (displayCategories, brands 등)\n\n* 아래\
        \ Parameters에 해당하는 검색조건들의 경우, 매 10분 마다 캐시가 됩니다 ( ex. 10시 10분, 10시 20분, 10시\
        \ 30분...)\n\n* ex. 10시 13분에 상품명을 [테스트 상품 -> 임시 상품]으로 변경 후 '임시 상품'으로 검색 시,\
        \ 10시 19분까지 검색되지않고, 10시 20분이후에 검색 가능합니다.\n\n* 항목 값(propNos, propValueNos)은\
        \ GET /products/custom-properties API를 참조하면됩니다.\n\n* filter.customProperties.propOperator\
        \ : 상품항목 추가정보 조회 조건을 선택합니다.\n  - AND: 항목값들을 모두 만족시키는 상품이 조회됩니다.\n      - \"\
        propNo: 100, propValueNos: 1 2 3\" 이 경우 propNo에 해당하는 propValueNos가 1 AND 2\
        \ AND 3으로 조회됩니다.\n  - OR: 항목값 중 하나라도 만족되는 상품이 조회됩니다. \n      - \"propNo: 100,\
        \ propValueNos: 1 2 3\" 이 경우 propNo에 해당하는 propValueNos가 1 OR 2 OR 3으로 조회됩니\
        다.\n\n ### OAUTH2 참고사항\n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: get-products-search-summary
      parameters:
        - name: filter.discountedPrices
          in: query
          description:
            "판매가 - 즉시할인 - 추가상품할인이 적용된 \"최종 할인가격\", between검색일 경우 입력값 2개 필\
            요(다수 정보는 항목 추가 필요"
          required: false
          schema:
            type: number
          example: '1000'
        - name: filter.keywords
          in: query
          description: 검색어(여러 검색어일 경우 space 로 구분 AND 연산)
          required: false
          schema:
            type: string
          example: 검색어1 검색어2
        - name: filter.keywordInResult
          in: query
          description: 결과내 검색(결과 내 검색의 검색어 space 구분 AND 연산)
          required: false
          schema:
            type: string
          example: 검색어1 검색어2
        - name: filter.discountedComparison
          in: query
          description: "최종 할인가격 검색 조건 (GT: 초과 - GREATER THAN, LTE: 미만 -LESS GREATER\
            \ THAN, GTE: 이상 - GREATER THAN or EQUAL, EQ: 동등 - EQUAL, BETWEEN: 사이의"
          required: false
          schema:
            type: string
          example: GT
        - name: filter.deliveryConditionType
          in: query
          description:
            "배송비 타입 (FREE: 무료, CONDITIONAL: 조건부 무료, FIXED_FEE: 유료(고정 배송비\
            ))"
          required: false
          schema:
            type: string
          example: free
        - name: filter.saleStatus
          in: query
          description:
            "판매 상태 ( 전체 판매 상태 조회: ALL_CONDITIONS, 판매대기와 판매중 상품 조회: READY_ONSALE,\
            \ 판매중 상품만 조회: ONSALE - default, 예약판매중인 상품과 판매중인 상품만 조회: RESERVATION_AND_ONSALE)"
          required: false
          schema:
            type: string
          example: ALL_CONDITIONS
        - name: filter.soldout
          in: query
          description: '품절 상품 포함 여부(default: false)'
          required: false
          schema:
            type: boolean
          example: 'false'
        - name: filter.totalReviewCount
          in: query
          description: '총 상품평 수 포함 여부(default: false, false 설정 시 무조건 0)'
          required: false
          schema:
            type: boolean
          example: 'false'
        - name: filter.familyMalls
          in: query
          description: '서비스에 계약된 모든 쇼핑몰 조회 여부 (default: false)'
          required: false
          schema:
            type: boolean
          example: 'false'
        - name: filter.productManagementCd
          in: query
          description: 판매자관리코드 같은 상품 검색
          required: false
          schema:
            type: string
          example: managementcode
        - name: filter.excludeMallProductNo
          in: query
          description: 조회시 제외할 상품번호
          required: false
          schema:
            type: integer
            format: int32
          example: '10001'
        - name: filter.includeMallProductNo
          in: query
          description: 조회할 상품번호
          required: false
          schema:
            type: integer
            format: int32
          example: '10000'
        - name: filter.includeNonDisplayableCategory
          in: query
          description:
            "전시카테고리 포함 여부 - categoryNos 조건이 있을 때 하위 뎁스 중 하나라도 ‘전시 안 함’이면\
            \ 결과에서 제외됩니다. (default: false)"
          required: false
          schema:
            type: boolean
          example: 'true'
        - name: filter.customProperties.propNos
          in: query
          description: 조회할 상품추가항목 번호
          required: false
          schema:
            type: string
          example: '100,101,102'
        - name: filter.customProperties.propValueNos
          in: query
          description: 조회할 상품추가항목 값
          required: false
          schema:
            type: string
          example: '1 2,3 4,5 6'
        - name: filter.customProperties.propOperator
          in: query
          description: '상품항목추가정보 조회 조건 (AND : 모두 만족하는 상품만 조회, OR : 하나라도 포함되는 상품 조회)'
          required: false
          schema:
            type: string
          example: AND
        - name: filter.stickerNos
          in: query
          description: 조회할 스티커번호
          required: false
          schema:
            type: integer
            format: int32
          example: '10000'
        - name: filter.minReviewRating
          in: query
          description: 상품평 최소 범위 조회 조건
          required: false
          schema:
            type: integer
            format: int32
          example: '3.0'
        - name: filter.maxReviewRating
          in: query
          description: 상품평 최대 범위 조회 조건
          required: false
          schema:
            type: integer
            format: int32
          example: '5.0'
        - name: categoryNos
          in: query
          description: 전시 카테고리 번호(여러개 일 경우 항목 추가)
          required: false
          schema:
            type: string
          example: '1,2,3,4'
        - name: excludeCategoryNos
          in: query
          description: '제외할 전시 카테고리 번호(여러개 일 경우 항목 추가, 번호에 속한 모든 하위 카테고리 제외)'
          required: false
          schema:
            type: string
          example: '1,2,3,4'
        - name: categoryOperator
          in: query
          description: '전시카테고리 검색 조건 (AND : 모두다 포함, OR : 한개라도 포함), default: OR'
          required: false
          schema:
            type: string
          example: AND
        - name: brandNos
          in: query
          description: 브랜드 번호(여러개 일 경우 항목 추가)
          required: false
          schema:
            type: string
          example: '1,2,3,4'
        - name: partnerNo
          in: query
          description: 파트너 번호(상품 공급업체 번호)
          required: false
          schema:
            type: integer
            format: int32
          example: '1'
        - name: onlySaleProduct
          in: query
          description: '세일 상품만 조회 여부(default: false)'
          required: false
          schema:
            type: boolean
          example: 'false'
        - name: shippingAreaType
          in: query
          description: '배송 구분 (Enum: [ PARTNER: 파트너 배송, MALL: 쇼핑몰 배송 ])'
          required: false
          schema:
            type: string
          example: MALL
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디
          required: true
          schema:
            type: string
          example: test-client-id
        - name: platform
          in: header
