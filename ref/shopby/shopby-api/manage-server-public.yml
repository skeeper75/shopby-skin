          in: header
          description: |2
           외부 API 연동키 (외부시스템연동 코드) - Authorization 사용 시 안보내도 됩니다.

          - 파트너 : 파트너관리 > 파트너 정보 조회 > 거래쇼핑몰 > 외부시스템 연동코드
          - 서비스 : 서비스관리 > 쇼핑몰관리 > 개발 연동 정보 > 외부 연동 키
          - 샵바이 프로 : 설정 > 기본정책 > 외부서비스 설정 > 외부 API 연동 정보 > 외부 API 연동 Key
          required: false
          schema:
            type: string
          example: 각 어드민에서 복사된 값
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/accumulations-usage-1532805667'
              examples:
                get-accumulations-usage:
                  value: "[{\"accumulationNo\":1,\"startAmount\":1000,\"restAmount\"\
                    :800,\"usages\":[{\"accumulationNo\":2,\"orderNo\":\"20210101000111000001\"\
                    ,\"useDateTime\":\"2025-10-27 12:05:06\",\"useAmount\":200}]}]"
