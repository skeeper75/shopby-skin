      summary: 적립금 사용처 추적하기
      description: |
        ## 부가설명 및 특이사항
        적립된 적립금의 번호를 넘기면 해당 적립금을 사용자가 어떤 주문에 사용했는지 추적해 줍니다.
        input 으로 넘긴 적립금 번호가 차감일 경우 제외되고 조회됩니다.

        기본 적립금 단위는 정수형으로 지원합니다. ex) 1000
        Global Mall의 경우, 적립금은 소수점 2자리까지 지원합니다. ex) 1000.00
      operationId: get-accumulations-usage
      parameters:
        - name: accumulationNos
          in: query
          description: 적립금 번호 리스트(최대 1000개)
          required: true
          schema:
            type: string
          example: '1,2,3'
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n"
