  /inquiries:
    get:
      tags:
        - Inquiry
      summary: 1:1문의 조회하기
      description:
        "\n답변 지연 여부는 문의 일시 기준으로 24시간 이내 답변 완료가 되지 않은 경우 **true**\n\n검색\
        \ 유형의 ISSUER 는 문의자 아이디, 문의자 이메일을 대상으로 검색함\n\n담당자 미지정 여부 (isUnspecified)가 담\
        당자 번호(assigneeNo)보다 우선순위에 있으며, 담당자를 설정하려면 담당자 미지정여부를 false로 설정해야 한다.\n\n담당\
        자 미지정여부가 false이고 assigneeNo를 지정하지 않을 경우에는 담당자 조건을 검사하지 않고 검색한다.\n\n ### 1:1문\
        의 검색 타입\n \n 값 | 설명 |\n---|-----|\n ALL | 전체 |\n INQUIRY_NO | 문의번호 |\n TITLE\
        \ | 문의제목 |\n CONTENT | 문의내용 |\n ISSUER | 문의자 |\n ASSIGNEE | 담당자명 |\n\n ###\
        \ 1:1문의 상태\n \n 값 | 설명 |\n---|-----|\n ISSUED | 답변대기 |\n ASKED | 답변대기 |\n\
        \ IN_PROGRESS | 진행중 |\n ANSWERED | 답변완료 |\n\n ### 문의자 상태\n \n 값 | 설명 |\n---|-----|\n\
        \ WAITING | 가입대기 |\n ACTIVE | 가입완료 |\n DORMANT | 휴면 |\n PAUSED | 이용정지 |\n\
        \ WITHDRAWN | 탈퇴 |\n GUEST | 비회원 |\n\n ### 날짜 검색 타입\n \n 값 | 설명 |\n---|-----|\n\
        \ REGISTER | 등록일 |\n ANSWER | 답변일 |\n\n ### contents[].assignee.assigneeStatus\n\
        \ \n 값 | 설명 |\n---|-----|\n WAITING | 등록대기 |\n INVESTIGATION | 검토중 |\n ACTIVE\
        \ | 등록완료 |\n DELETE | 삭제 |\n LOCKED | 로그인 잠금 |\n DORMANT | 휴면 |\n UNASSIGNEED\
        \ | 담당자미지정 |\n\n ### external\n inquiryTypeChannel이 NCP가 아닌 경우 값이 있다.\n  \
        \ * inquiryTypeChannel이 NAVER_PAY인 경우: external.naver\n\n ## assignee\n* 담\
        당자 미지정: 답변 완료되지 않은 1:1문의 중 담당자 운영자가 삭제되거나 1:1문의 등록 시점에 담당자가 없는 경우 해당 1:1문의\
        는 담당자 미지정이다.\n  * assigneeNo = 0\n  * assigneeName = 담당자미지정\n  * assigneeStatus\
        \ = UNASSIGNEED\n* 삭제 상태의 담당자: 답변 완료된 1:1문의 중 담당자 운영자가 삭제 상태에 있는 경우. 이 때는\
        \ 운영자 정보는 남아있다.\n  * assigneeNo = 운영자 번호\n  * assigneeName = 운영자 이름\n  * assigneeStatus\
        \ = DELETE\n* 삭제된 담당자: 답변 완료된 1:1문의 중 담당자 운영자가 완전히 삭제되었을 경우 삭제된 어드민이다.\n \
        \ * assigneeNo = null\n  * assigneeName = 삭제된 담당자\n  * assigneeStatus = DELETE\n\
        \n ### contents[].assignee.assigneeStatus\n \n 값 | 설명 |\n---|-----|\n WAITING\
        \ | 등록대기 |\n INVESTIGATION | 검토중 |\n ACTIVE | 등록완료 |\n DELETE | 삭제 |\n LOCKED\
        \ | 로그인 잠금 |\n DORMANT | 휴면 |\n UNASSIGNEED | 담당자미지정 |\n"
      operationId: search-inquiries
      parameters:
        - name: page
          in: query
          description: 페이지 번호
          required: false
          schema:
            type: number
          example: '1'
        - name: pageSize
          in: query
          description: 페이지 사이즈 (최대 10000)
          required: false
          schema:
            type: number
          example: '10'
        - name: searchType
          in: query
          description: 검색 유형^|ALL | INQUIRY_NO | TITLE | CONTENT | ISSUER | ASSIGNEE
          required: false
          schema:
            type: string
        - name: keyword
          in: query
          description: 키워드
          required: false
          schema:
            type: string
          example: keyword
        - name: inquiryTypeNo
          in: query
          description: 문의 유형 번호
          required: false
          schema:
            type: number
          example: '1'
        - name: assigneeNo
          in: query
          description: 담당자 번호
          required: false
          schema:
            type: number
          example: '10'
        - name: issuerNo
          in: query
          description: 문의자 번호
          required: false
          schema:
            type: number
          example: '0'
        - name: inquiryStatuses
          in: query
          description:
            "문의 상태 (ISSUED(ASKED-이전버전 호환용): 답변대기, IN_PROGRESS: 답변 진행중, ANSWERED:\
            \ 답변완료)"
          required: false
          schema:
            type: string
          example: '[ANSWERED]'
        - name: startDateTime
          in: query
          description: 검색 기준 시작일 (미입력 시 현재 기준 3달 전)
          required: false
          schema:
            type: string
          example: 2025-10-27 12:05:21
        - name: endDateTime
          in: query
          description: 검색 기준 종료일 (미입력 시 현재 시각)
          required: false
          schema:
            type: string
          example: 2025-10-27 12:05:21
        - name: isUnspecified
          in: query
          description: 담당자 미지정 여부 (assigneeNo보다 우선순위이다. 기본값 = false)
          required: false
          schema:
            type: boolean
          example: 'false'
        - name: searchDateType
          in: query
          description: 검색 날짜 유형 (기본값 = REGISTER(등록일))^|REGISTER | ANSWER
          required: false
          schema:
            type: string
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n"
          required: false
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: partnerId
          in: header
          description:
            "\n 파트너 아이디 (파트너사 로그인계정)\n \n ※ server API 호출하는 기존 방식으로, 향후 fade\
            \ out될 수 있습니다.<br>\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다.<br>\n\
            \n (Authorization 입력했을 경우, partnerId와 mallKey는 null로 보내시길 바랍니다.)<br>\n\n"
          required: false
          schema:
            type: string
          example: pingdamallpartner
        - name: mallKey
