          - 샵바이 프로 : 설정 > 기본정책 > 외부서비스 설정 > 외부 API 연동 정보 > 외부 API 연동 Key
          required: false
          schema:
            type: string
          example: 각 어드민에서 복사된 값
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/terms-custom-customTermsNo-members2042102439'
              examples:
                get-custom-terms-agree-members:
                  value: "{\"totalCount\":2,\"contents\":[{\"customTermsNo\":123,\"\
                    memberNo\":1001,\"mallNo\":1,\"agree\":true,\"agreeDateTime\"\
                    :\"2025-10-27 12:05:39\",\"mobileNo\":\"010-1234-5678\",\"email\"\
                    :\"user1@email.com\"},{\"customTermsNo\":123,\"memberNo\":1002,\"\
                    mallNo\":1,\"agree\":true,\"agreeDateTime\":\"2025-10-27 12:05:39\"\
                    ,\"mobileNo\":\"010-5678-1234\",\"email\":\"user2@email.com\"\
                    }]}"
