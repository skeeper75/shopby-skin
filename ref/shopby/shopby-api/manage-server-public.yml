openapi: 3.0.1
info:
  title: manage-server
  description: ' 쇼핑몰 운영(manage) 관련 server API입니다.'
  version: '1.0'
servers:
  - url: https://server-api.e-ncp.com
tags:
  - name: Accumulations
    description: 적립금
paths:
  /accumulations:
    get:
      tags:
        - Accumulations
      summary: 적립금 조회하기
      description: |
        ## 부가설명 및 특이사항
        등록일/시작일/만료일로 적립금 상태를 검색/조회하는 API 입니다.

        기본 적립금 단위는 정수형으로 지원합니다. ex) 1000
        Global Mall의 경우, 적립금은 소수점 2자리까지 지원합니다. ex) 1000.00
      operationId: get-accumulations-by-condition
      parameters:
        - name: page
          in: query
          description: 페이지 번호
          required: false
          schema:
            type: number
          example: '1'
        - name: pageSize
          in: query
          description: 페이지 사이즈 (최대 10000)
          required: false
          schema:
            type: number
          example: '10'
        - name: periodType
          in: query
          description: '기간 설정 타입 (REGISTER : 등록일 | START : 생성일 | EXPIRE : 만료일)'
          required: true
          schema:
            type: string
          example: REGISTER
        - name: accumulationNos
          in: query
          description: 적립금 번호 리스트
          required: false
          schema:
            type: string
          example: '1,2,3'
        - name: startYmd
          in: query
          description: 검색 시작일
          required: true
          schema:
            type: string
          example: YYYY-MM-DD
        - name: endYmd
          in: query
          description: 검색 종료일
          required: true
          schema:
            type: string
          example: YYYY-MM-DD
        - name: isOnlyAvailable
          in: query
          description: '사용가능한 적립금만 조회 여부 ( default : false )'
          required: false
          schema:
            type: boolean
          example: 'false'
        - name: externalKey
          in: query
          description: 외부 키(조회용)
          required: false
          schema:
            type: string
          example: abraded
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n"
          required: false
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: partnerId
          in: header
          description:
            "\n 파트너 아이디 (파트너사 로그인계정)\n \n ※ server API 호출하는 기존 방식으로, 향후 fade\
            \ out될 수 있습니다.<br>\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다.<br>\n\
            \n (Authorization 입력했을 경우, partnerId와 mallKey는 null로 보내시길 바랍니다.)<br>\n\n"
          required: false
          schema:
            type: string
          example: pingdamallpartner
        - name: mallKey
          in: header
          description: |2
           외부 API 연동키 (외부시스템연동 코드) - Authorization 사용 시 안보내도 됩니다.

          - 파트너 : 파트너관리 > 파트너 정보 조회 > 거래쇼핑몰 > 외부시스템 연동코드
          - 서비스 : 서비스관리 > 쇼핑몰관리 > 개발 연동 정보 > 외부 연동 키
          - 샵바이 프로 : 설정 > 기본정책 > 외부서비스 설정 > 외부 API 연동 정보 > 외부 API 연동 Key
          required: false
          schema:
            type: string
          example: 각 어드민에서 복사된 값
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/accumulations177281248'
              examples:
                get-accumulations-by-condition:
                  value: "{\"items\":[{\"memberNo\":90001,\"accumulationNo\":1,\"\
                    accumulationAmt\":1000,\"registerYmdt\":\"2025-10-27 12:05:07\"\
                    ,\"startYmdt\":\"2025-10-27 12:05:07\",\"expireYmdt\":\"2025-10-27\
                    \ 12:05:07\",\"accumulationReserveReason\":\"ADD_MANUAL\",\"reasonDetail\"\
                    :\"상세사유\",\"accumulationStatus\":\"GIVE\",\"orderNo\":\"orderNo\"\
                    ,\"productDisplayName\":\"기저귀\",\"restAmount\":100.0,\"externalKey\"\
                    :\"abcdedd\"}],\"totalCount\":100}"
  /accumulations/assembles:
    get:
      tags:
        - Accumulations
      summary: 어셈블 적립금 요청 목록 조회
      description: '필터(회원번호, 상태 등)로 적립금 어셈블 요청을 페이지 조회합니다.'
