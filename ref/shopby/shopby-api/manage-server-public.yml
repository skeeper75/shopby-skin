          description:
            "\n 파트너 아이디 (파트너사 로그인계정)\n \n ※ server API 호출하는 기존 방식으로, 향후 fade\
            \ out될 수 있습니다.<br>\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다.<br>\n\
            \n (Authorization 입력했을 경우, partnerId와 mallKey는 null로 보내시길 바랍니다.)<br>\n\n"
          required: false
          schema:
            type: string
          example: pingdamallpartner
        - name: mallKey
          in: header
          description: |2
           외부 API 연동키 (외부시스템연동 코드) - Authorization 사용 시 안보내도 됩니다.

          - 파트너 : 파트너관리 > 파트너 정보 조회 > 거래쇼핑몰 > 외부시스템 연동코드
          - 서비스 : 서비스관리 > 쇼핑몰관리 > 개발 연동 정보 > 외부 연동 키
          - 샵바이 프로 : 설정 > 기본정책 > 외부서비스 설정 > 외부 API 연동 정보 > 외부 API 연동 Key
          required: false
          schema:
            type: string
          example: 각 어드민에서 복사된 값
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/accumulations-assembles1635087197'
              examples:
                get-assembles-search:
                  value: "{\"totalCount\":1,\"contents\":[{\"no\":10,\"mallNo\":2173,\"\
                    mallName\":\"베타 쇼핑몰\",\"requestType\":\"DIRECT_ADD\",\"requestGroup\"\
                    :\"ADD\",\"requestGroupLabel\":\"지급\",\"requestDateTime\":\"2020-10-20\
                    \ 08:00:00\",\"immediately\":false,\"amount\":2500.0,\"reason\"\
                    :\"ADD_MANUAL\",\"reasonLabel\":\"지급사유 라벨\",\"reasonDetail\":\"\
                    적립금 상세 - 주문 지급 적립금 시 사용\",\"validPeriodType\":\"NO_LIMIT\",\"\
                    validPeriod\":0,\"expireDateTime\":\"2026-10-27 12:05:02\",\"\
