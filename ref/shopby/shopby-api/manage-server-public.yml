        - name: pageSize
          in: query
          description: 페이지 사이즈 (최대 10000)
          required: false
          schema:
            type: number
          example: '10'
        - name: mallNos
          in: query
          description: 쇼핑몰 번호
          required: false
          schema:
            type: number
        - name: searchType
          in: query
          description: 검색 유형
          required: false
          schema:
            type: string
          example: ALL
        - name: keyword
          in: query
          description: 검색 내용
          required: false
          schema:
            type: string
          example: 이벤트A
        - name: periodType
          in: query
          description: 검색 기간 유형
          required: false
          schema:
            type: string
          example: REGISTER
        - name: startDateTime
          in: query
          description: 시작일
          required: false
          schema:
            type: string
        - name: endDateTime
          in: query
          description: 종료일
          required: false
          schema:
            type: string
        - name: immediately
          in: query
          description: 즉시지급 여부
          required: false
          schema:
            type: boolean
        - name: requestGroupType
          in: query
          description: 전체/지급/차감
          required: false
          schema:
            type: string
          example: ALL/ADD/SUB
        - name: requestTypes
          in: query
          description: 예약지급/즉시지급/즉시차감
          required: false
          schema:
            type: string
