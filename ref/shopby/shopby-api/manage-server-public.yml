                    :34,\"tryCount\":34,\"status\":\"COMPLETED\",\"statusLabel\":\"\
                    상태 라벨\"}]}"
  /accumulations/externals:
    get:
      tags:
        - Accumulations
      summary: 외부적립금 연동 이력 조회
      description: |
        ## 부가설명 및 특이사항
        외부적립금 연동을 사용하는 몰에서 적립금 연동 이력을 조회합니다.
      operationId: get-accumulations-externals
      parameters:
        - name: page
          in: query
          description: 페이지 번호
          required: false
          schema:
            type: number
          example: '1'
        - name: pageSize
          in: query
          description: 페이지 사이즈 (최대 10000)
          required: false
          schema:
            type: number
          example: '10'
        - name: startYmdt
          in: query
          description: 조회 시작일
          required: true
          schema:
            type: string
          example: 2023-01-10 01:21:00
        - name: endYmdt
          in: query
          description: 조회 종료일
          required: true
          schema:
            type: string
          example: 2023-01-10 01:21:00
        - name: success
          in: query
          description: 성공여부
          required: false
          schema:
            type: boolean
          example: 'true'
        - name: requestType
          in: query
          description: '요청타입 (ADD, SUB, SUB_ROLLBACK)'
          required: false
          schema:
            type: string
          example: ADD
        - name: mappingKeyType
          in: query
          description: '매핑키 종류 - mappingKeys 와 같이 보내야 함. (REVIEW, ORDER, ORDER_OPTION)'
          required: false
          schema:
            type: string
          example: ORDER
        - name: mappingKeys
          in: query
          description: 매핑키 값 - mappingKeyType과 같이 보내야 함. 컴마로 연결
          required: false
          schema:
            type: string
          example: '1,2,3'
        - name: externalNos
          in: query
          description: 외부연동키. 컴마로 연결
          required: false
          schema:
            type: string
          example: '1,2,3'
        - name: seqs
          in: query
          description: 트랜잭션 ID 리스트
          required: false
          schema:
            type: string
          example: '1,2,3'
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n"
          required: false
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: partnerId
          in: header
          description:
            "\n 파트너 아이디 (파트너사 로그인계정)\n \n ※ server API 호출하는 기존 방식으로, 향후 fade\
            \ out될 수 있습니다.<br>\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다.<br>\n\
            \n (Authorization 입력했을 경우, partnerId와 mallKey는 null로 보내시길 바랍니다.)<br>\n\n"
          required: false
          schema:
            type: string
          example: pingdamallpartner
        - name: mallKey
          in: header
          description: |2
           외부 API 연동키 (외부시스템연동 코드) - Authorization 사용 시 안보내도 됩니다.

          - 파트너 : 파트너관리 > 파트너 정보 조회 > 거래쇼핑몰 > 외부시스템 연동코드
          - 서비스 : 서비스관리 > 쇼핑몰관리 > 개발 연동 정보 > 외부 연동 키
          - 샵바이 프로 : 설정 > 기본정책 > 외부서비스 설정 > 외부 API 연동 정보 > 외부 API 연동 Key
          required: false
          schema:
            type: string
          example: 각 어드민에서 복사된 값
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/accumulations-externals320580630'
              examples:
                get-accumulations-externals:
                  value: "{\"items\":[{\"seq\":0,\"requestType\":\"ADD\",\"mappingKeyType\"\
                    :\"ORDER\",\"mappingKey\":\"123\",\"memberKey\":\"hong123\",\"\
                    requestJson\":\"{}\",\"amount\":1000,\"requestDateTime\":\"2025-10-27\
                    \ 12:05:10\",\"externalNo\":null,\"success\":false,\"responseJson\"\
                    :null}],\"totalCount\":1}"
