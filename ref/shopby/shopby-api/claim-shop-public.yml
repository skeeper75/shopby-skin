      operationId: post-guest-claims-estimate
      parameters:
        - name: ClientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: TEST_CLIENTID
        - name: platform
          in: header
          description: '클라이언트 플랫폼(PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: 'PC, MOBILE_WEB'
        - name: guestToken
          in: header
          description: 비회원 토큰^|test-guest-token
          required: true
          schema:
            type: string
          example: TEST_GUEST_TOKEN
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: language
          in: header
          description: '언어 (기본값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/profile-claims-estimate-373007703'
            examples:
              post-guest-claims-estimate:
                value: "{\"claimType\":\"RETURN\",\"productCnt\":1,\"claimReasonType\"\
                  :\"CANCEL_BEFORE_PAY\",\"returnWayType\":\"BUYER_DIRECT_RETURN\"\
                  ,\"claimedProductOptions\":[{\"orderProductOptionNo\":1,\"productCnt\"\
                  :1}],\"responsibleObjectType\":null}"
      responses:
        '200':
          description: '200'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/guest-order-options-orderOptionNo-claims-estimate974114982'
              examples:
                post-guest-claims-estimate:
                  value: "{\"productAmtInfo\":{\"standardPrice\":0,\"immediateDiscountAmt\"\
                    :0,\"additionalDiscountAmt\":0,\"productCouponDiscountAmt\":0,\"\
                    exchangeAdjustAmt\":0,\"freeGiftDiscountAmt\":0,\"exchangeImmediateDiscountedPrice\"\
                    :0,\"exchangeDiscountAmt\":0,\"totalAmt\":0,\"discountAmt\":0,\"\
                    immediateDiscountedPrice\":0},\"deliveryAmtInfo\":{\"beforeDeliveryAmt\"\
                    :0,\"afterDeliveryAmt\":0,\"refundDeliveryAmt\":0,\"payOnDelivery\"\
                    :true,\"sellerFault\":false,\"returnDeliveryAmt\":0,\"returnAdjustAmt\"\
                    :0,\"buyerReturn\":false,\"exchangeDeliveryAmt\":0,\"exchangeAdjustAmt\"\
                    :0,\"beforeRemoteDeliveryAmt\":0,\"afterRemoteDeliveryAmt\":0,\"\
                    totalAmt\":0},\"subtractionAmtInfo\":{\"cartCouponAmt\":0,\"deliveryCouponAmt\"\
                    :0,\"refundAdjustAmt\":0,\"refundAdjustReason\":\"걍\",\"totalAmt\"\
                    :0},\"refundPayAmt\":0,\"refundSubPayAmt\":0,\"refundExternalPayAmt\"\
                    :0,\"refundExternalPayInfos\":[],\"refundType\":\"PAYCO\",\"refundPayType\"\
                    :\"CREDIT_CARD\",\"refundTypeLabel\":\"신용카드\",\"additionalPayAmt\"\
                    :0,\"refundMainPayAmt\":0}"
