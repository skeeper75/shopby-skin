          required: false
          schema:
            type: string
          example: ko
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/profile-claims-free-gifts-satisfy1138615305'
            examples:
              post-guest-free-gifts-satisfy:
                value: '[{"orderProductOptionNo":1,"productCnt":1}]'
      responses:
        '200':
          description: '200'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/profile-claims-free-gifts-satisfy-23813812'
              examples:
                post-guest-free-gifts-satisfy:
                  value: "[{\"conditionNo\":1,\"targetOrderProductNo\":1,\"targetOrderNo\"\
                    :\"2025062581914010000\",\"freeGifts\":[{\"orderProductOptionNo\"\
                    :1,\"satisfy\":true}]}]"
  /guest/claims/{claimNo}/account:
    put:
      tags:
        - Guest
      summary: 환불 계좌 정보 수정하기
      description: |2

        ## 부가설명 및 특이사항
        환불 계좌 정보를 수정하는 비회원용 API입니다.

