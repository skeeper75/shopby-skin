  /profile/order-options/{orderOptionNo}/claims/estimate:
    get:
      tags:
        - Member
      summary: 회원 클레임시 변경되는 주문의 환불 예상금액 계산하기(단일옵션)
      description: |2

        ## 부가설명 및 특이사항
        선택옵션을 취소할 경우 환불 예상금액을 미리 계산하는 API입니다.

        ## 참고
        ClaimType을 EXCHANGE로 요청 시 exchangeProductNo, exchangeOptionNo, exchangeCnt가 null일 경우
        동일상품, 동일옵션, 교환수량으로 환불예상금액을 조회합니다.

        ## 화면 예시
        [![](http://image.toast.com/aaaaahb/api-description/order/myorder/[GET]%20profile_order-options_claim_estimate%20클레임%20시%20변경되는%20주문%20환불계산%201-1.png?autox150)](http://image.toast.com/aaaaahb/api-description/order/myorder/[GET]%20profile_order-options_claim_estimate%20클레임%20시%20변경되는%20주문%20환불계산%201-1.png)
        [![](http://image.toast.com/aaaaahb/api-description/order/myorder/[GET]%20profile_order-options_claim_estimate%20클레임%20시%20변경되는%20주문%20환불계산%201-2.png?autox150)](http://image.toast.com/aaaaahb/api-description/order/myorder/[GET]%20profile_order-options_claim_estimate%20클레임%20시%20변경되는%20주문%20환불계산%201-2.png)
      operationId: get-profile-order-options-no-claims-estimate
      parameters:
        - name: orderOptionNo
          in: path
          description: 주문 상품 옵션 번호^|1
          required: true
          schema:
            type: integer
            format: int32
        - name: claimReasonType
          in: query
          description:
            "클레임사유(CHANGE_MIND: 단순변심(색상,사이즈 등), DEFECTIVE_PRODUCT: 상품불량/파\
            손, WRONG_DELIVERY: 배송누락/오배송, OUT_OF_STOCK_SYSTEM: 재고부족(품절취소), CANCEL_BEFORE_PAY:\
            \ 입금전취소, WRONG_PRODUCT_DETAIL: 상품상세 정보와 다름, DELAY_DELIVERY: 판매자 배송 지연, OTHERS_SELLER:\
            \ 기타(판매자 귀책), OTHERS_BUYER: 기타(구매자 귀책), OUT_OF_STOCK: 상품 품절/재고 없음, LATER_INPUT_ORDER:\
            \ 배송지 미입력 취소, LATER_INPUT_ORDER_RECEIVER_CANCEL: 선물거절취소)^|CHANGE_MIND"
          required: true
          schema:
            type: string
        - name: claimType
          in: query
          description: '클레임타입(CANCEL: 취소, RETURN: 반품, EXCHANGE: 교환)^|CANCEL'
          required: true
          schema:
            type: string
        - name: exchangeCnt
          in: query
          description: 교환할수량(claimType이 EXCHANGE인 경우)^|1
          required: false
          schema:
            type: string
        - name: exchangeOptionNo
          in: query
          description: 교환할옵션번호(claimType이 EXCHANGE인 경우)^|1
          required: false
          schema:
            type: string
        - name: exchangeProductNo
          in: query
          description: 교환할상품번호(claimType이 EXCHANGE인 경우)^|1
          required: false
          schema:
            type: string
        - name: productCnt
          in: query
          description: 취소/반품할 제품수량^|1
          required: true
          schema:
            type: string
        - name: responsibleObjectType
          in: query
          description: "귀책 - responsibleObjectType이 null이면 ClaimReasonType에 매핑되는 귀책\
            \ 적용(CHANGE_MIND, CANCEL_BEFORE_PAY, OTHERS_BUYER -> BUYER / DEFECTIVE_PRODUCT,\
            \ WRONG_DELIVERY, OUT_OF_STOCK_SYSTEM, WRONG_PRODUCT_DETAIL, DELAY_DELIVERY,\
            \ OUT_OF_STOCK, OTHERS_SELLER -> SELLER)(BUYER: 구매자귀책, SELLER: 판매자귀책)^|BUYER"
          required: false
          schema:
            type: string
        - name: returnWayType
          in: query
          description:
            "반품상품 수거방법(SELLER_COLLECT: 판매자수거요청, BUYER_DIRECT_RETURN: 구매자직\
            접반품)^|SELLER_COLLECT"
          required: false
          schema:
            type: string
        - name: ClientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: TEST_CLIENTID
        - name: platform
          in: header
          description: '클라이언트 플랫폼(PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: 'PC, MOBILE_WEB'
        - name: accessToken
          in: header
          description: 로그인 인증키^|test-access-token
          required: false
          schema:
            type: string
          example: TEST_ACCESS_TOKEN
        - name: Shop-By-Authorization
          in: header
          description: 액세스 토큰(Oauth2 스펙)^|Bearer test-access-token
          required: false
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: language
          in: header
          description: '언어 (기본값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
      responses:
        '200':
          description: '200'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/guest-order-options-orderOptionNo-claims-estimate974114982'
              examples:
                get-profile-order-options-no-claims-estimate:
                  value: "{\"productAmtInfo\":{\"standardPrice\":0,\"immediateDiscountAmt\"\
                    :0,\"additionalDiscountAmt\":0,\"productCouponDiscountAmt\":0,\"\
                    exchangeAdjustAmt\":0,\"freeGiftDiscountAmt\":0,\"exchangeImmediateDiscountedPrice\"\
                    :0,\"exchangeDiscountAmt\":0,\"immediateDiscountedPrice\":0,\"\
                    discountAmt\":0,\"totalAmt\":0},\"deliveryAmtInfo\":{\"beforeDeliveryAmt\"\
                    :0,\"afterDeliveryAmt\":0,\"refundDeliveryAmt\":0,\"payOnDelivery\"\
                    :true,\"sellerFault\":false,\"returnDeliveryAmt\":0,\"returnAdjustAmt\"\
                    :0,\"buyerReturn\":false,\"exchangeDeliveryAmt\":0,\"exchangeAdjustAmt\"\
                    :0,\"beforeRemoteDeliveryAmt\":0,\"afterRemoteDeliveryAmt\":0,\"\
                    totalAmt\":0},\"subtractionAmtInfo\":{\"cartCouponAmt\":0,\"deliveryCouponAmt\"\
                    :0,\"refundAdjustAmt\":0,\"refundAdjustReason\":\"걍\",\"totalAmt\"\
