openapi: 3.0.1
info:
  title: claim-shop
  description: ' 클레임(claim) 관련 shop API입니다.'
  version: unspecified
servers:
  - url: https://shop-api.e-ncp.com
tags: []
paths:
  /guest/claims/cancel:
    post:
      tags:
        - Guest
      summary: 옵션취소 신청하기(복수옵션)
      description: |2

        ## 부가설명 및 특이사항
        다수의 선택옵션을 취소신청하는 비회원용 API입니다.

        ## API Version
        ### 1.0
        기존 방식으로, API 요청에 성공 시 204 No Content를 응답합니다.
        ### 1.1 (개발중)
        변경된 방식으로, API 요청에 성공 시 200 Ok 와 신청된 클레임과 옵션에 대한 정보를 응답합니다. (문서 참조)

        ## 화면 예시
        [![](http://image.toast.com/aaaaahb/api-description/order/guest/[POST]%20guest_claim_cancle%20%EC%A3%BC%EB%AC%B8%EC%B7%A8%EC%86%8C.png?autox150)](http://image.toast.com/aaaaahb/api-description/order/guest/[POST]%20guest_claim_cancle%20%EC%A3%BC%EB%AC%B8%EC%B7%A8%EC%86%8C.png)
      operationId: post-guest-claims-cancel
      parameters:
        - name: ClientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: TEST_CLIENTID
        - name: platform
          in: header
          description: '클라이언트 플랫폼(PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: 'PC, MOBILE_WEB'
        - name: guestToken
          in: header
          description: 비회원 토큰^|test-guest-token
          required: true
          schema:
            type: string
          example: TEST_GUEST_TOKEN
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.1'
        - name: language
          in: header
          description: '언어 (기본값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/profile-claims-cancel-2023591141'
            examples:
              post-guest-claims-cancel:
                value: "{\"claimType\":\"CANCEL\",\"claimReasonType\":\"CHANGE_MIND\"\
                  ,\"claimReasonDetail\":\"사유\",\"bankAccountInfo\":null,\"saveBankAccountInfo\"\
                  :false,\"responsibleObjectType\":null,\"claimedProductOptions\"\
                  :[{\"orderProductOptionNo\":10001,\"productCnt\":1}],\"refundsImmediately\"\
                  :true}"
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/guest-order-options-orderOptionNo-claims-return1157243429'
              examples:
                post-guest-claims-cancel:
                  value: "{\"claimNo\":1,\"claimedOptions\":[{\"originOrderOptionNo\"\
                    :1,\"originOrderCnt\":2,\"orderOptionNo\":2,\"orderCnt\":3}]}"
  /guest/claims/estimate:
    post:
      tags:
        - Guest
      summary: 클레임시 변경되는 주문 환불 예상금액 계산하기(복수옵션)
