  /guest/claims/{claimNo}/withdraw:
    put:
      tags:
        - Guest
      summary: 클레임 철회하기(클레임번호)
      description: |2

        ## 부가설명 및 특이사항
        클레임 번호로 신청된 클레임을 철회하는 비회원용 API입니다.

        ## 화면 예시
        [![](http://image.toast.com/aaaaahb/api-description/order/guest/[PUT]%20guest_claims_withdraw%20%ED%81%B4%EB%A0%88%EC%9E%84%20%EC%B2%A0%ED%9A%8C.png?autox150)](http://image.toast.com/aaaaahb/api-description/order/guest/[PUT]%20guest_claims_withdraw%20%ED%81%B4%EB%A0%88%EC%9E%84%20%EC%B2%A0%ED%9A%8C.png)
      operationId: put-guest-claims-no-withdraw
      parameters:
        - name: claimNo
          in: path
          description: 클레임 번호^|1
          required: true
          schema:
            type: integer
            format: int32
        - name: ClientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: TEST_CLIENTID
        - name: platform
          in: header
          description: '클라이언트 플랫폼(PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: 'PC, MOBILE_WEB'
        - name: guestToken
          in: header
          description: 비회원 토큰^|test-guest-token
          required: true
          schema:
            type: string
          example: TEST_GUEST_TOKEN
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: language
          in: header
          description: '언어 (기본값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
      responses:
        '204':
          description: '204'
