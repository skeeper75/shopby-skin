        ## Request
        ### 참고사항
        - responsibleObjectType이 null이면 클레임 사유에 해당되는 귀책이 들어갑니다.
      operationId: put-guest-claims-no-account
      parameters:
        - name: claimNo
          in: path
          description: 클레임 번호^|1
          required: true
          schema:
            type: integer
            format: int32
        - name: ClientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: TEST_CLIENTID
        - name: platform
          in: header
          description: '클라이언트 플랫폼(PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: 'PC, MOBILE_WEB'
        - name: guestToken
          in: header
          description: 비회원 토큰^|test-guest-token
          required: true
          schema:
            type: string
          example: TEST_GUEST_TOKEN
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: language
          in: header
          description: '언어 (기본값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/profile-claims-claimNo-account1993194450'
            examples:
              put-guest-claims-no-account:
                value: "{\"bank\":\"KDB\",\"account\":\"123456789\",\"depositorName\"\
                  :\"예금주\"}"
      responses:
        '204':
          description: '204'
