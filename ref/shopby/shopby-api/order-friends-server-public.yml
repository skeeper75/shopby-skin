  /settlement/detail:
    get:
      tags:
        - Settlements
      summary: 파트너 정산 상세 데이터 조회하기 v1.1
      description: |2

        ## 부가설명 및 특이사항
        매출 데이터 조회를 위한 API입니다.

        ### v1.0
        페이징을 지원하지 않습니다.
        request 의 page와 size 는 사용하지 않습니다.
        응답값은 v1.1 응답의 contents[] 필드와 동일합니다.
        ```
        [
          {
            "companyType": "회사이름",
            "mallName": "쇼핑몰명",
            ...
          }
        ]
        ```

        ### v1.1
        페이징 처리를 위한 totalCount 를 제공합니다.

        request 의 page와 size 를 입력해야 합니다.

        응답값 중, contents[] 하위 필드는 기존 v1.0 API 의 응답과 일치합니다.
      operationId: get-settlement-detail
      parameters:
        - name: endYmd
          in: query
          description: 종료일^|2018-03-04
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: 검색할 페이지 번호^|1
          required: true
          schema:
            type: number
        - name: settlementPartnerType
          in: query
          description: '파트너 구분(DOMESTIC: 국내파트너, OVERSEAS: 해외파트너)^|DOMESTIC'
          required: false
          schema:
            type: string
        - name: size
          in: query
          description: '1회에 조회할 데이터 개수 (default: 100)^|100'
          required: true
          schema:
            type: number
        - name: startYmd
          in: query
          description: 시작일^|2018-03-04
          required: true
          schema:
            type: string
        - name: systemKey
          in: header
          description:
            " 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n- 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n- 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: czFERzFSRGZQY3hwZjQxZTNZd2NTZz09
        - name: Authorization
          in: header
          description:
            " 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n- 형식: Bearer {access_token} (중\
            간에 띄어쓰기 필수입니다.)\n- 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: false
          schema:
            type: string
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br />\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br />\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n ^|각\
            \ 어드민에서 복사된 값"
          required: false
          schema:
            type: string
          example: M21OMm8zU1JHUEU1NGFqUURvUklGQlc5NHViTTBaNlI
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.1'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/settlement-detail-1949787227'
              examples:
                get-settlement-detail:
                  value: "{\"totalCount\":12,\"contents\":[{\"companyName\":\"회사이름\
                    \",\"mallName\":\"쇼핑몰명\",\"optionManagementCd\":\"\",\"orderNo\"\
                    :\"202001100000000001\",\"orderProductNo\":1001,\"orderProductOptionNo\"\
                    :100001,\"partnerNo\":1,\"partnerName\":\"파트너명\",\"partnerType\"\
                    :\"DOMESTIC\",\"valueAddedTaxTypeLabel\":\"\",\"mallProductNo\"\
                    :12312,\"mallOptionNo\":10101,\"productName\":\"대방어\",\"option\"\
                    :\"옵션\",\"settlementDeliveryTypeLabel\":\"\",\"immediateDiscountedPrice\"\
                    :0,\"orderCnt\":1,\"refundCnt\":0,\"salesAmt\":0,\"purchasePrice\"\
                    :0,\"commissionRate\":0,\"commissionAmt\":0,\"mallDiscountAmt\"\
                    :0,\"partnerDiscountAmt\":0,\"mallProductAdjustAmt\":0,\"partnerProductAdjustAmt\"\
                    :0,\"mallDeliveryAdjustAmt\":0,\"partnerDeliveryAdjustAmt\":0,\"\
                    mallDeliveryAmt\":0,\"deliveryAmt\":0,\"refundAdjustAmt\":0,\"\
                    settlementAmt\":0,\"payYmdt\":\"2025-10-31 11:08:47\",\"settlementYmdt\"\
                    :\"2025-10-31 11:08:47\",\"refundYmdt\":\"2025-10-31 11:08:47\"\
                    ,\"memo\":\"\",\"seq\":1,\"purchaseYn\":null}],\"totalPage\":2}"
  /statistics/promotions:
    get:
      tags:
        - Statistic
      summary: 프로모션 통계 - 쿠폰 내역 조회
      description: |-
        ## 부가설명 및 특이사항
        프로모션 통계 - 쿠폰 목록 조회를 위한 API 입니다.
      operationId: get-statistics-promotions-coupons
      parameters:
        - name: couponType
          in: query
          description: '쿠폰 타입(PRODUCT, CART, GIFT)^|PRODUCT,CART'
          required: true
          schema:
            type: string
        - name: displayBrandNo
          in: query
          description: 전시브랜드 번호^|1
          required: false
          schema:
            type: number
        - name: endYmd
          in: query
          description: 조회종료일(yyyy-MM-dd)^|2020-04-22
          required: true
          schema:
            type: string
        - name: genderTypes
          in: query
          description: '회원 성별^|MALE,FEMALE,UNKNOWN'
          required: false
          schema:
            type: string
        - name: includesClaim
          in: query
          description: '클레임구분 (클레임 포함, 클레임 제외)^|false'
          required: false
          schema:
            type: boolean
        - name: keyword
          in: query
          description: 단일 검색어^|1
          required: false
          schema:
            type: string
        - name: memberGradeNo
          in: query
          description: 회원 등급^|1
          required: false
          schema:
            type: number
        - name: memberGroupNo
          in: query
          description: 회원 그룹^|1
          required: false
          schema:
            type: number
        - name: memberJoinType
          in: query
          description: '회원 구분(MEMBER, NON_MEMBER)^|MEMBER,NON_MEMBER'
          required: false
          schema:
            type: string
        - name: memberType
          in: query
          description: "회원 가입유형(ALL, MALL, PAYCO, NAVER, KAKAO, FACEBOOK, IAMSCHOOL,\
            \ LIIVMATE, NHN, NHNENT, UNIONE, LINE, NCPSTORE, KAKAO_SYNC, GOOGLE, APPLE,\
            \ APP_CARD)^|ALL,MALL,PAYCO,NAVER,KAKAO,FACEBOOK,IAMSCHOOL,LIIVMATE,NHN"
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: 페이지 번호^|1
          required: true
          schema:
            type: number
        - name: partnerNo
          in: query
          description: 파트너번호^|1
          required: false
          schema:
            type: number
