openapi: 3.0.1
info:
  title: order-friends-server
  description: ' 주문과 관련된 기능(통계, 정산, CS 등)을 수행하는 server API입니다.'
  version: unspecified
servers:
  - url: https://server-api.e-ncp.com
tags:
  - name: Settlements
    description: 정산
paths:
  /cs:
    get:
      tags:
        - OrderCs
      summary: CS 처리내역 조회
      description: CS 처리내역 조회
      operationId: get-cs
      parameters:
        - name: orderNo
          in: query
          description: 주문번호^|order-no
          required: false
          schema:
            type: number
        - name: csNos
          in: query
          description: 'CS 번호^|[1, 2, 3]'
          required: false
          schema:
            type: string
        - name: startYmd
          in: query
          description: '조회 시작 일자 (기본값: 3개월 전)^|2025-10-28'
          required: false
          schema:
            type: string
        - name: endYmd
          in: query
          description: '조회 종료 일자 (기본값: 오늘)^|2025-10-31'
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: '페이지 번호 (기본값: 1)^|1'
          required: false
          schema:
            type: number
        - name: size
          in: query
          description: '페이지 크기 (기본값: 30)^|30'
          required: false
          schema:
            type: number
        - name: systemKey
          in: header
          description:
            " 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n- 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n- 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: czFERzFSRGZQY3hwZjQxZTNZd2NTZz09
        - name: Authorization
          in: header
          description:
            " 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n- 형식: Bearer {access_token} (중\
            간에 띄어쓰기 필수입니다.)\n- 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: false
          schema:
            type: string
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br />\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br />\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n ^|각\
            \ 어드민에서 복사된 값"
          required: false
          schema:
            type: string
          example: M21OMm8zU1JHUEU1NGFqUURvUklGQlc5NHViTTBaNlI
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cs1493835005'
              examples:
                get-cs:
                  value: "{\"totalCount\":1,\"contents\":[{\"csNo\":0,\"mallNo\":0,\"\
                    orderNo\":\"\",\"orderOptionNo\":0,\"productName\":\"\",\"registerAudit\"\
                    :{\"timestamp\":\"\",\"adminNo\":0,\"name\":\"\",\"clientIp\"\
                    :\"\"},\"csChannelType\":\"SERVICE\",\"csType\":\"PAY\",\"csPathType\"\
                    :\"IN_BOUND\",\"csStatusType\":\"PROCESSING\",\"title\":\"\",\"\
                    content\":\"\",\"memberNo\":0,\"ordererName\":\"\",\"claimWithdrawReason\"\
                    :\"\",\"deliveryExpectedYmdt\":\"\",\"holdDeliveryReason\":\"\"\
                    ,\"fromAppName\":\"\",\"registerNameAsAppName\":false,\"deleted\"\
                    :false,\"updateAudit\":null,\"csAutoType\":null}]}"
  /orders/sales:
    get:
      tags:
        - Settlements
      summary: 쇼핑몰 정산 데이터 조회하기
      description: |2

        ## 부가설명 및 특이사항
        쇼핑몰 매출 데이터 조회를 위한 API입니다.

         items[].productInfo 의 purchaseYn, commissionRate, purchasePrice 는 데이터가 있는 경우에만 조회됩니다.
      operationId: get-orders-sales
      parameters:
        - name: endYmd
          in: query
          description: 조회 종료일^|yyyy-mm-dd
          required: true
          schema:
            type: string
        - name: includesDeliveryAmt
          in: query
          description: 배송비 매출 포함 여부^|true
          required: true
          schema:
            type: boolean
        - name: page
          in: query
          description: 페이지 번호^|1
          required: true
          schema:
            type: number
        - name: size
          in: query
          description: 페이지 사이즈^|10
          required: true
          schema:
            type: number
        - name: startYmd
          in: query
          description: 조회 시작일^|yyyy-mm-dd
          required: true
          schema:
            type: string
        - name: systemKey
          in: header
          description:
            " 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n- 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n- 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: czFERzFSRGZQY3hwZjQxZTNZd2NTZz09
        - name: Authorization
          in: header
          description:
            " 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n- 형식: Bearer {access_token} (중\
            간에 띄어쓰기 필수입니다.)\n- 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: false
          schema:
            type: string
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br />\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br />\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n ^|각\
            \ 어드민에서 복사된 값"
          required: false
          schema:
            type: string
          example: M21OMm8zU1JHUEU1NGFqUURvUklGQlc5NHViTTBaNlI
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/orders-sales547821119'
              examples:
                get-orders-sales:
                  value:
                    "{\"totalCount\":1,\"items\":[{\"seq\":1,\"orderNo\":\"201905131143378311\"\
                    ,\"payYmdt\":\"2025-10-31 11:09:13\",\"registerYmdt\":\"2025-10-31\
                    \ 11:09:13\",\"salesRegisterType\":\"ADD_SALES\",\"orderProductNo\"\
                    :259798,\"orderProductOptionNo\":220240,\"claimNo\":null,\"orderCnt\"\
                    :1,\"refundCnt\":0,\"refundYmdt\":null,\"orderStatusType\":\"\
                    DELIVERY_ING\",\"memo\":\"\",\"memberInfo\":{\"memberNo\":1,\"\
                    externalMembershipKey\":\"\",\"memberGradeName\":\"기본등급\",\"additionalInfoJson\"\
                    :\"\",\"memberGroupInfos\":[]},\"productInfo\":{\"mallProductNo\"\
                    :1,\"productManagementCd\":\"cd\",\"productName\":\"[휴먼큐어] 히즈클\
                    린 포맨 남성용품 모음전\",\"mallOptionNo\":35786417,\"mallAdditionalProductNo\"\
                    :0,\"optionManagementCd\":\"102-1\",\"option\":\"사이즈:90\",\"purchaseYn\"\
                    :\"N\",\"commissionRate\":\"0%\",\"purchasePrice\":0,\"sku\":\"\
                    \",\"setOptions\":[],\"globalProductNo\":null},\"priceInfo\":{\"\
                    salePrice\":1000,\"immediateDiscountAmt\":1000,\"addPrice\":1000,\"\
                    additionalDiscountAmt\":100,\"productCouponDiscountAmt\":100,\"\
                    deliveryCouponDiscountAmt\":50,\"cartCouponDiscountAmt\":0,\"\
                    adjustedAmt\":0},\"paymentInfo\":{\"pgType\":\"KCP\",\"payType\"\
                    :\"KAKAO_PAY\",\"pgPayAmt\":0,\"accumulationUseAmt\":0,\"externalPointUseAmt\"\
                    :0},\"couponInfo\":{\"cartCouponNo\":1,\"cartCouponIssueNo\":10,\"\
                    productCouponNo\":5,\"productCouponIssueNo\":12},\"channelType\"\
                    :\"PAYCO\",\"accumulationAmt\":null,\"externalPayAmt\":null,\"\
                    salesRegisterTypeForDisplay\":\"\"}]}"
  /settlement:
    get:
      tags:
        - Settlements
      summary: 파트너 정산 데이터 조회하기
      description: |2

        ## 부가설명 및 특이사항
        정산 데이터 조회를 위한 API입니다.
      operationId: get-settlement
      parameters:
        - name: month
          in: query
          description: 월^|1
          required: true
          schema:
            type: number
        - name: settlementPartnerType
          in: query
          description: '파트너 구분(DOMESTIC: 국내파트너, OVERSEAS: 해외파트너)^|DOMESTIC'
          required: false
          schema:
            type: string
        - name: year
          in: query
          description: 연도^|2022
          required: true
