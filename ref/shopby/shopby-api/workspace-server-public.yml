openapi: 3.0.1
info:
  title: workspace-server
  description: ' 워크스페이스 (https://workspace.nhn-commerce.com) 관련 server API 입니다.'
  version: '1.0'
servers:
  - url: https://server-api.e-ncp.com
tags:
  - name: ExternalScript
    description: 외부스크립트
  - name: Auth
    description: 인증
paths:
  /app-installed/extend:
    put:
      tags:
        - app-installed
      summary: 설치 앱 만료일 연장하기
      description:
        "## 부가설명 및 특이사항    \n인앱 결제 완료 시 설치한 앱 만료일을 '최초 세팅' 또는 '연장'합니다.\
        \   \n워크스페이스는 판매사로부터 전달받은 '만료일(requestDateTime)'까지, 쇼핑몰 운영자들이 해당 앱을 실행 가능하\
        도록 허용합니다.<br>\n만료일 이후에는 앱이 동작하지 않습니다."
      operationId: extend-app-installed
      parameters:
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n - 발급경로: 워크스페이스\
            > 셀러어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description: " \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: true
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/app-installed-extend-186163940'
            examples:
              extend-app-installed:
                value: |-
                  {
                    "orderNo" : "1",
                    "requestDateTime" : "2025-10-27 11:37:13",
                    "paymentType" : "TRIAL",
                    "price" : 10000
                  }
      responses:
        '204':
          description: '204'
  /app-installed/status:
    get:
      tags:
        - app-installed
      summary: 앱 사용 상태 조회하기
      description:
        " ## 부가설명 및 특이사항\n 앱 사용 상태를 조회 할 수 있는 API입니다.\n \n 앱의 설치 상태를 가져\
        옵니다.\n \n ### currentStatus\n \n ## 만료(결제대기) EXPIRED\n - 앱 실행을 위해 결제가 필요한\
        \ 앱을 의미합니다.\n 앱 만료일(requestDateTime)이 연장되지 않아 사용할 수 없는 상태의 앱입니다. 쇼핑몰 운영자의\
        \ 결제 등의 액션에 따른 판매사의 앱 만료일 연장API 호출이 필요합니다.\n - case1. 앱이 초기 설치 되어, 앱 만료일API을\
        \ 호출하지 않아 앱을 실행할 수 없는 상태.\n - case2. 만료일을 연장하지 않았거나, 환불 등으로 판매사가 앱의 만료일을 초\
        기화한 상태\n\n ## 사용 중 ACTIVE\n - 앱 사용 중인 상태로, 정상적으로 앱 기능을 사용할 수 있습니다.\n - 무료앱\
        의 경우, 앱을 설치하자마자 active 상태가 됩니다.\n\n ## 삭제 DELETED\n - 쇼핑몰 운영자가 설치한 앱을 삭제한\
        \ 상태를 의미합니다. 앱을 다시 사용하려면 쇼핑몰 운영자의 재설치가 필요합니다.\n "
      operationId: get-app-installed-status
      parameters:
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n - 발급경로: 워크스페이스\
            > 셀러어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description: " \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: true
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app-installed-status1982038195'
              examples:
                get-app-installed-status:
                  value: |-
                    {
                      "appNo" : 1,
                      "appName" : "appName",
                      "currentStatus" : "ACTIVE",
                      "expireDateTime" : "2025-11-06 11:37:12"
                    }
  /auth/me:
    get:
      tags:
        - Auth
      summary: access_token을 발급한 어드민/몰 정보 조회하기
      description:
        "\n ## 부가설명 및 특이사항\n access_token을 발급한 로그인한 어드민의 정보와 몰 정보를 조회합니\
        다.\n    \n 해당 API를 통해, 앱 개발사가 쇼핑몰 관리자의 정보를 조회할 수 있으며,<br> \n 수집하는 정보는 앱 스토\
        어(Appstore)에서 앱 설치 시 구매자들에게 노출됩니다.<br>\n 데이터 수집에 대해 동의한 구매자에 한해 앱 설치가 가능하며\
        , 권한 사용 미동의 시 설치 및 판매되지 않습니다.<br>\n \n 쇼핑몰 솔루션 타입에 따른 필드 값<br>\n ## 샵바이\n\
        \ - 상점 고유 번호 : mall.mallNo\n - 어드민 롤 (adminRole): MASTER, NORMAL  \n <br>\n\
        \ ## 고도몰\n - 상점 고유 번호 : mall.shopNo \n - 어드민 롤 (adminRole): SUPER_ADMIN, CS,\
        \ ADMIN"
      operationId: get-mall-profile
      parameters:
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n - 발급경로: 워크스페이스\
            > 셀러어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: abc
        - name: Authorization
          in: header
          description: " \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: true
          schema:
            type: string
          example: abc
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth-me-746827232'
              examples:
                get-mall-profile:
                  value: |-
                    {
                      "id" : "test",
                      "name" : "홍길동",
                      "mobile" : "01012341234",
                      "adminRole" : "ADMIN",
                      "email" : "abc@nhn-commerce.com",
                      "departmentName" : "운영1파트",
                      "jobPositionName" : "부장",
                      "jobDutyName" : "파트장",
                      "mall" : {
                        "mallNo" : 1,
                        "mallName" : "홍길몰",
                        "domains" : [ {
                          "domain" : "abc.com",
                          "deviceType" : "PC"
                        } ],
                        "countryCode" : "KR",
                        "sno" : 1,
                        "shopNo" : 1,
                        "mallId" : "hello_",
                        "clientId" : "clientId==",
                        "customerCenter" : {
                          "tel" : "",
                          "email" : ""
                        },
                        "plan" : "PRO",
                        "frontType" : "SKIN"
                      },
                      "business" : {
                        "businessRegistrationNo" : "1231212345",
                        "companyName" : "(주)홍길몰",
                        "representativeName" : "홍길동"
                      },
                      "partner" : {
                        "partnerNo" : 1,
                        "partnerName" : "hello"
                      },
                      "solutionType" : "SHOPBY"
                    }
  /auth/token:
    post:
      tags:
        - Auth
      summary: authorization code로 단기 토큰발급하기
      description:
        "\n ## 부가설명 및 특이사항\n authorization code를 이용해서 단기 access Token(5분\
        )을 발급 받습니다\n - 화면 단에서 server API 통신 시 호출하는 API로, 해당 화면을 접속한 클라이언트에 종속되는 토큰\
        입니다.<br>\n - 토큰을 발급한 장비의 IP 에서만 server API 를 호출할 수 있습니다.\n  ex. 고객이 쇼핑몰에 접\
        속한경우 프론트에서 서버 API 호출 바로 할 때\n \n - 만약 서버단에서 데이터를 주기적으로 동기화 하거나 server to server\
        \ 통신 하기 위할 경우,\n POST /auth/token/long-lived를 호출하여 장기토큰을 발급받으시길 바랍니다.\n\n\
        \ - 단기토큰(access_token)의 유효기간: 5분\n expire_in(토큰 유효기간)이 만료될 경우, 함께 리턴받은 refresh_token을\
        \ 파라미터로 다시 access_token을 갱신할 수 있습니다.\n\n- 단기토큰(access_token)을 발급받는 방법\n :\
        \  2가지 grant_type에 따라, Request body에 입력해야할 파라미터가 상이합니다. \n - case① authorization_code\
        \ (authorization code를 통해 access_token을 응답받고자하는 경우)\n - case② refresh_token\
        \ (발급된 refresh_token을 통해 만료된 access_token을 응답받고자 하는경우)\n "
      operationId: create-token
      parameters:
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth-token-4075154'
            examples:
              create-token:
                value: |-
                  {
                    "grant_type" : "authorization_code",
                    "client_id" : "test-systemKey",
                    "redirect_uri" : "http://hello.com",
                    "code" : "test-code",
                    "refresh_token" : "test-refreshToken",
                    "client_secret" : "test-secretKey"
                  }
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth-token1244629579'
              examples:
                create-token:
                  value: |-
                    {
                      "token_type" : "Bearer",
                      "access_token" : "hello",
                      "expire_in" : "2025-10-27T11:37:20.34053371",
                      "refresh_token" : "hello",
                      "issued_at" : "2025-10-27T11:37:15.340533576",
                      "scopes" : [ ]
                    }
  /auth/token/long-lived:
    post:
      tags:
        - Auth
      summary: authorization code로 장기 토큰발급하기
      description:
        "\n ## 부가설명 및 특이사항\n authorization code를 이용해서 장기 access Token(100년\
        )을 발급 받습니다\n \n - 서버단에서 데이터를 주기적으로 동기화 하거나 server to server 통신 시 호출하는 API입\
        니다.\n - 앱에 등록된 IP에서만 server API 를 호출할 수 있습니다.\n - 장기토큰(access_token)의 유효기간\
        : 100년 (사실상 무기한이며, 별도 refresh_token이 없습니다)\n \n -장기토큰(access_token)을 발급받는\
        \ 방법\n authorization_code (authorization code를 통해 access_token을 응답받을 수 있습니\
        다.\n  "
      operationId: create-long-lived-token
      parameters:
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth-token-long-lived1568104223'
            examples:
              create-long-lived-token:
                value: |-
                  {
                    "grant_type" : "authorization_code",
                    "client_id" : "test-systemKey",
                    "redirect_uri" : "http://hello.com",
                    "code" : "test-code",
                    "refresh_token" : "",
                    "client_secret" : "test-secretKey"
                  }
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth-token-long-lived-2112938244'
              examples:
                create-long-lived-token:
                  value: |-
                    {
                      "token_type" : "Bearer",
                      "access_token" : "hello",
                      "expire_in" : "2125-10-03T11:37:14.74256385",
                      "refresh_token" : null,
                      "issued_at" : "2025-10-27T11:37:14.742562967",
                      "scopes" : [ ]
                    }
  /auth/token/revoke:
    post:
      tags:
        - Auth
      summary: 장기 토큰 제거하기
      description: "\n ## 부가설명 및 특이사항    \n 발급된 access_token(장기토큰)을 제거합니다.\n "
      operationId: revoke-token
      parameters:
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n - 발급경로: 워크스페이스\
            > 셀러어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description: " \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: true
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth-token-revoke1044698510'
            examples:
              revoke-token:
                value: |-
                  {
                    "token" : "access-token"
                  }
      responses:
        '204':
          description: '204'
  /external-script:
    get:
      tags:
        - ExternalScript
      summary: 외부스크립트 조회하기
      description: "\n ## 부가설명 및 특이사항\n\n 등록된 외부스크립트를 조회합니다. \n"
      operationId: get-external-scripts
      parameters:
        - name: scriptTypes
          in: query
          description: "스크립트 타입 - (MAIN, COMMON_HEAD, COMMON_FOOTER, PRODUCT, PRODUCT_LIST,\
            \ PRODUCT_SEARCH, CART, ORDER, ORDER_DETAIL, ORDER_COMPLETE, DISPLAY_SECTION,\
            \ MEMBER_JOIN_COMPLETE, MY_PAGE)^|MAIN"
          required: false
          schema:
            type: string
        - name: deviceTypes
          in: query
          description: '디바이스 타입 - (PC, MOBILE)^|PC'
          required: false
          schema:
            type: string
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n - 발급경로: 워크스페이스\
            > 셀러어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description: " \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: true
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/external-script-936175978'
              examples:
                get-external-scripts:
                  value: |-
                    [ {
                      "scriptType" : "MAIN",
                      "deviceType" : "PC",
                      "content" : "script",
                      "registerDateTime" : "2025-10-27 11:37:16",
                      "updateDateTime" : "2025-10-27 11:37:16",
                      "scriptTypeLabel" : "메인 페이지"
                    } ]
    post:
      tags:
        - ExternalScript
      summary: 외부스크립트 등록하기
      description:
        " ## 부가설명 및 특이사항\n 쇼핑몰 운영자가 본인 몰에 앱 최초 실행시점에, \n 발급받은 access_token\
        \ (POST /auth/token 또는 POST /auth/token/long-lived 의 응답 값으로 내려온 access_token)\
        \ 으로 \n 권한체크를 진행하여, 권한이 있다면 해당 API를 통해 외부스크립트를 mall에 저장합니다.\n ### ENUM\n -\
        \ MAIN: 메인 페이지\n- COMMON_HEAD: 상단 공통영역\n- COMMON_FOOTER: 하단 공통영역\n- PRODUCT:\
        \ 상품 상세 페이지\n- PRODUCT_LIST: 상품 리스트 페이지\n- PRODUCT_SEARCH: 상품 검색결과 페이지\n-\
