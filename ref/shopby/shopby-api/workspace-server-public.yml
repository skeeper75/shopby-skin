        \ |\n | 메인분류 상품조회 페이지 | - | sb.displaySection | [상품 디자인 섹션 조회 API](https://docs.shopby.co.kr/?url.primaryName=display/#/ProductSection/get-sections-by-section-id)|\n\
        \ | 장바구니 페이지 | - | sb.cart | [회원 장바구니 조회 API](https://docs.shopby.co.kr/?url.primaryName=order/#/Cart/get-cart)<br>[비\
        회원 장바구니 조회 API](https://docs.shopby.co.kr/?url.primaryName=order/#/GuestOrder/post-guest-cart)\
        \ |\n | 주문서 작성/결제 페이지 | - | sb.orderSheet | [주문서 조회 API](https://docs.shopby.co.kr/?url.primaryName=order/#/OrderSheet/get-order-sheet)|\n\
