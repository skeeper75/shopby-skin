openapi: 3.0.1
info:
  title: promotion-server
  description: 프로모션 혜택(promotion)관련 server API입니다.
  version: 0.1.0-SNAPSHOT
servers:
  - url: https://server-api.e-ncp.com
tags: []
paths:
  /coupons:
    get:
      tags:
        - Coupon
      summary: 쿠폰 검색하기
      description:
        " ## 부가설명 및 특이사항\n 검색 조건을 기반으로 쇼핑몰이 가지고 있는 쿠폰 정보를 검색합니다.\n \n couponNos에\
        \ 입력한 쿠폰번호 리스트와 keyword로 입력한 쿠폰번호는 AND 조건으로 검색됩니다."
      operationId: get-search-coupon
      parameters:
        - name: page
          in: query
          description: 페이지 번호^|1
          required: true
          schema:
            type: integer
            format: int32
        - name: size
          in: query
          description: 페이지 크기^|30
          required: true
          schema:
            type: integer
            format: int32
        - name: searchDateType
          in: query
          description:
            "날짜 검색 타입(REGISTER_YMD: 등록일, ISSUE_START_YMD: 발행시작일, ISSUE_END_YMD:\
            \ 발행종료일, UPDATE_YMD: 수정일)^|REGISTER_YMD"
          required: true
          schema:
            type: string
        - name: startYmd
          in: query
          description: 조회 시작일^|2025-06-29
          required: true
          schema:
            type: string
        - name: endYmd
          in: query
          description: 조회 종료일^|2025-09-29
          required: true
          schema:
            type: string
        - name: issueType
          in: query
          description:
            "쿠폰 발급 타입(DOWNLOAD: 다운로드 발급, CODE_DESIGNATE: 지정코드 발급, CODE_RANDOM:\
            \ 난수코드 발급, INSERT: 인서트 발급, CODE_DESIGNATE_ADMIN_ONLY: 지정코드 발급(어드민 전용))^|DOWNLOAD"
          required: false
          schema:
            type: string
        - name: couponType
          in: query
          description:
            "혜택 구분 타입(PRODUCT: 상품적용 쿠폰, PRODUCT_PLUS: 상품 금액 할인(플러스), CART:\
            \ 주문적용 쿠폰, CART_DELIVERY: 장바구니 배송비 할인, GIFT: 기프트 쿠폰)^|CART"
          required: false
          schema:
            type: string
        - name: statusTypes
          in: query
          description:
            "쿠폰 상태 타입 리스트(ISSUE_READY: 발급대기, ISSUE_ING: 발급 중, ISSUE_STOP:\
            \ 발급중지, ISSUE_END: 발급종료)^|ISSUE_ING,ISSUE_END"
          required: false
          schema:
            type: string
        - name: searchKeywordType
          in: query
          description:
            "검색어 타입(ALL: 전체, COUPON_NAME: 쿠폰명, COUPON_NO: 쿠폰번호, REGISTER_ADMIN:\
            \ 등록자)^|COUPON_NO"
          required: false
          schema:
            type: string
        - name: keyword
          in: query
          description: 검색어^|검색어
          required: false
          schema:
            type: string
        - name: couponNos
          in: query
          description: '쿠폰번호 리스트^|1,2,3'
          required: false
          schema:
            type: string
        - name: exceptIssueEndCoupon
          in: query
          description: '사용불가 쿠폰 제외 여부 (true: 사용불가 쿠폰 제외, false: 사용불가 쿠폰 포함)^|false'
          required: false
          schema:
            type: boolean
        - name: memberGradeNo
          in: query
          description: 회원 등급 번호^|1
          required: false
          schema:
            type: number
        - name: memberGroupNo
          in: query
          description: 회원 그룹 번호^|1
          required: false
          schema:
            type: number
        - name: systemKey
          in: header
          description:
            " 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n- 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n- 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: SABANGNET
        - name: Authorization
          in: header
          description:
            " 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n- 형식: Bearer {access_token} (중\
            간에 띄어쓰기 필수입니다.)\n- 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: false
          schema:
            type: string
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br />\n Authorization을을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br />\n Authorization을 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n ^|각\
            \ 어드민에서 복사된 값"
          required: false
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coupons-186158211'
              examples:
                get-search-coupon:
                  value: "{\"totalCount\":10,\"contents\":[{\"no\":1,\"mallName\"\
                    :\"몰이름\",\"couponName\":\"쿠폰이름\",\"couponType\":\"CART\",\"couponSubType\"\
                    :\"CART\",\"issueType\":\"DOWNLOAD\",\"usesMinLimit\":true,\"\
                    minSalePrice\":0,\"usesMaxLimit\":true,\"maxSalePrice\":0,\"fixed\"\
                    :true,\"discountAmt\":0,\"discountPercent\":0,\"maxDiscountAmt\"\
                    :0,\"issueLimitCnt\":10,\"usesDailyIssueLimit\":false,\"dailyIssueLimitCnt\"\
                    :1,\"usesPersonalIssueLimit\":false,\"issuePerPersonLimitCnt\"\
                    :1,\"dailyIssuePerPersonLimitCnt\":1,\"totalIssueCnt\":9,\"totalIssueCntByAdmin\"\
                    :0,\"totalUseCnt\":1,\"issueStartYmdt\":\"2025-06-29 17:53:21\"\
                    ,\"issueEndYmdt\":\"2025-09-29 17:53:21\",\"serviceShareRate\"\
                    :100,\"registerYmdt\":\"2025-06-29 17:53:21\",\"updateYmdt\":\"\
                    2025-09-29 17:53:21\",\"couponStatusType\":\"ISSUE_END\",\"promotionCode\"\
                    :\"CODE\",\"issueStopped\":false,\"scheduledIssuePlan\":false,\"\
                    memberGradeNos\":[1,2,3],\"memberGroupNos\":[1,2,3],\"benefitAmt\"\
                    :null}]}"
    post:
      tags:
        - Coupon
      summary: 쿠폰 생성하기
      description: |2-
         ## 부가설명 및 특이사항
         쿠폰을 신규 생성합니다.
      operationId: post-coupon
      parameters:
        - name: systemKey
          in: header
          description:
            " 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n- 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n- 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: SABANGNET
        - name: Authorization
          in: header
          description:
            " 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n- 형식: Bearer {access_token} (중\
            간에 띄어쓰기 필수입니다.)\n- 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: false
          schema:
            type: string
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br />\n Authorization을을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br />\n Authorization을 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n ^|각\
            \ 어드민에서 복사된 값"
          required: false
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/coupons-2077927525'
            examples:
              post-coupon:
                value: "{\"mallNo\":1,\"couponName\":\"test-coupon\",\"reason\":\"\
                  test-reason\",\"usableConstraint\":{\"usablePlatformTypes\":[\"\
                  PC\",\"MOBILE_WEB\",\"MOBILE_APP\"],\"useEndYmdt\":\"2025-12-29\
                  \ 17:53:21\",\"useDays\":1,\"limitPayType\":null,\"limitPayTypes\"\
                  :[],\"useStopped\":false},\"issuableConstraint\":{\"issueType\"\
                  :\"DOWNLOAD\",\"issueStartYmdt\":\"2025-09-29 17:53:21\",\"issueEndYmdt\"\
                  :\"2025-12-29 17:53:21\",\"memberGradeNo\":0,\"memberGradeNos\"\
                  :[0,1],\"memberGroupNos\":[2,3],\"issueLimitCnt\":999,\"issueStartHour\"\
                  :0,\"issueEndHour\":24,\"issueStopped\":false,\"finishesIssuing\"\
                  :false,\"usesDailyIssueLimit\":false,\"dailyIssueLimitCnt\":0,\"\
                  usesPersonalIssueLimit\":false,\"issuePerPersonLimitCnt\":0,\"dailyIssuePerPersonLimitCnt\"\
                  :0,\"issuablePlatformTypes\":[\"PC\",\"MOBILE_WEB\",\"MOBILE_APP\"\
                  ],\"channelTypes\":[\"NAVER_EP\"],\"possibleDaysOfWeek\":[1,2,3,4,5,6,7],\"\
                  promotionCode\":null,\"couponCodeLength\":0,\"isPeriodEnd\":false},\"\
                  discount\":{\"usesMinLimit\":true,\"minSalePrice\":1000,\"usesMaxLimit\"\
                  :true,\"maxSalePrice\":10000,\"fixed\":true,\"discountAmt\":500,\"\
                  discountPercent\":null,\"maxDiscountAmt\":null},\"couponType\":\"\
                  CART\",\"couponSubType\":\"CART\",\"cartCouponDetail\":{\"usableOtherCoupon\"\
                  :false,\"skipsAccumulation\":false,\"couponIssueLimitTypes\":[\"\
                  PRODUCT_DETAIL\"],\"couponTargetType\":\"BRAND\",\"couponTargets\"\
                  :[{\"couponTargetType\":\"BRAND\",\"targetNo\":1,\"targetName\"\
                  :\"할인대상브랜드명\"}],\"excludesTarget\":false,\"couponExcludeTargets\"\
                  :[{\"couponTargetType\":\"PRODUCT\",\"targetNo\":1,\"targetName\"\
                  :\"할인제외대상이름\"}]},\"productCouponDetail\":{\"skipsAccumulation\"\
                  :false,\"usableCartCoupon\":true,\"serviceSharePercent\":100,\"\
                  couponIssueLimitTypes\":[\"PRODUCT_DETAIL\"],\"couponTargetType\"\
                  :\"ALL_PRODUCT\",\"couponTargets\":[{\"couponTargetType\":\"PRODUCT\"\
                  ,\"targetNo\":1,\"targetName\":\"할인대상이름\"}],\"excludesTarget\":false,\"\
                  couponExcludeTargets\":[{\"couponTargetType\":\"PRODUCT\",\"targetNo\"\
                  :1,\"targetName\":\"할인제외대상이름\"}]},\"giftCouponDetail\":{\"benefitEndYmdt\"\
                  :null,\"benefitExpirationDays\":1,\"benefitAmt\":0,\"giftCouponType\"\
                  :\"ACCUMULATION\"}}"
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coupons-1711516014'
              examples:
                post-coupon:
                  value: '{"couponNo":1}'
  /coupons/codes:
    get:
      tags:
        - Coupon
      summary: 쿠폰 랜덤코드 조회하기 (개발중)
      description: " ## 부가설명 및 특이사항\n 코드 발급(자동생성) 유형의 쿠폰 랜덤코드를 조회합니다.\n "
      operationId: get-coupon-random-codes
      parameters:
        - name: couponNos
          in: query
          description: 쿠폰 번호 리스트^|1
          required: true
          schema:
            type: integer
            format: int32
        - name: page
          in: query
          description: 페이지 번호^|1
          required: true
          schema:
            type: integer
            format: int32
        - name: size
          in: query
          description: 페이지 크기^|30
          required: true
          schema:
            type: integer
            format: int32
        - name: issued
          in: query
          description: '회원 발급 여부 (true: 발급, false: 미발급)^|true'
          required: true
          schema:
            type: boolean
        - name: systemKey
          in: header
          description:
            " 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n- 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n- 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: SABANGNET
        - name: Authorization
          in: header
          description:
            " 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n- 형식: Bearer {access_token} (중\
            간에 띄어쓰기 필수입니다.)\n- 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: false
          schema:
            type: string
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br />\n Authorization을을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br />\n Authorization을 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n ^|각\
            \ 어드민에서 복사된 값"
          required: false
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coupons-codes-958981943'
              examples:
                get-coupon-random-codes:
                  value: "{\"totalCount\":1,\"contents\":[{\"couponNo\":1,\"couponCode\"\
                    :\"11232\",\"couponCodeStatusType\":\"ISSUED\",\"couponIssueNo\"\
                    :1,\"memberNo\":1}]}"
  /coupons/exclude-targets:
    get:
      tags:
        - Coupon
      summary: 쿠폰의 제외 대상 조회
      description:
        " ## 부가설명 및 특이사항\n 쿠폰 번호를 입력받아 쿠폰의 제외 대상을 조회합니다.\n \n 쿠폰 번호를 입력\
        하지 않는 경우, 해당 쇼핑몰 전체를 대상으로 조회합니다."
      operationId: get-coupon-exclude-targets
      parameters:
        - name: couponNos
          in: query
          description: '쿠폰 번호 목록^|1,2,3'
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: 페이지 번호 (1 이상)^|1
          required: false
          schema:
            type: integer
            format: int32
        - name: size
          in: query
          description: 페이지 크기^|30
          required: false
          schema:
            type: integer
            format: int32
        - name: systemKey
          in: header
          description:
            " 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n- 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n- 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: SABANGNET
        - name: Authorization
          in: header
          description:
            " 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n- 형식: Bearer {access_token} (중\
            간에 띄어쓰기 필수입니다.)\n- 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: false
          schema:
            type: string
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br />\n Authorization을을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br />\n Authorization을 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n ^|각\
            \ 어드민에서 복사된 값"
          required: false
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/coupons-targets616348469'
              examples:
                get-coupon-exclude-targets:
                  value: "{\"totalCount\":1,\"totalPage\":1,\"contents\":[{\"couponNo\"\
                    :0,\"targetNo\":0,\"targetName\":\"exclude-target-name\",\"targetType\"\
                    :\"PRODUCT\"}]}"
  /coupons/issues:
    get:
      tags:
        - CouponIssue
      summary: 지급된 쿠폰 검색하기
      description:
        " ## 부가설명 및 특이사항\n 회원에게 지급된 쿠폰 정보를 조회합니다.\n \n memberNos, memberIds,\
        \ couponNos, couponIssueNos 중 적어도 하나의 필드에는 값을 입력해야 합니다.\n couponIssueNos (쿠\
        폰 지급 번호) 입력 시 startYmd/endYmd 값을 입력하지 않아도 조회할 수 있습니다.\n couponIssueNos 입력하\
        지 않는 경우 startYmd/endYmd 값을 필수로 입력해야 합니다."
      operationId: get-search-coupon-issue
      parameters:
        - name: memberNos
          in: query
          description: '회원 번호 목록^|1,2,3'
          required: false
          schema:
            type: string
        - name: memberIds
          in: query
          description: '회원 ID 목록^|test1,test2,test3'
          required: false
          schema:
            type: string
        - name: couponNos
          in: query
          description: '쿠폰 번호 목록^|1,2,3'
          required: false
          schema:
            type: string
        - name: couponIssueNos
          in: query
          description: '쿠폰 지급 번호 목록^|1,2,3'
          required: false
          schema:
            type: string
        - name: searchDateType
          in: query
          description:
            "날짜검색타입(ISSUE_START_YMD: 쿠폰발행시작일, ISSUE_END_YMD: 쿠폰발행종료일, ISSUE_YMD:\
            \ 쿠폰지급일, USE_END_YMD: 쿠폰만료일)^|ISSUE_YMD"
          required: true
          schema:
            type: string
        - name: startYmd
          in: query
          description: 조회 시작일^|2025-06-29
          required: true
          schema:
            type: string
        - name: endYmd
          in: query
