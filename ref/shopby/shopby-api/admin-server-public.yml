        "## 부가설명 및 특이사항\n 쇼핑몰과 계약 파트너를 조회하는 api 입니다.\n \n### 파트너 상태\n-\
        \ WAITING: 등록대기\n- INVESTIGATION: 검토중\n- ACTIVE: 등록완료\n\n### 파트너 유형\n- NORMAL:\
        \ 일반\n- MALLDELIVERY: 배송파트너 (deprecated)\n- DELIVERY: 배송파트너\n- SHOPBY: 샵바이\
        \ 파트너\n\n### 과세 형태\n- NORMAL: 일반과세자\n- SIMPLE: 간이과세자\n- VAT_FREE: 부가세 면세사업\
        자\n- CORPORATION: 법인사업자\n- FREE_CORPORATION: 면세법인사업자\n- ETC: 기타\n\n### 어드민\
        \ 상태\n- WAITING: 등록대기\n- INVESTIGATION: 검토중\n- ACTIVE: 등록완료\n- DELETE: 삭제\n\
        - LOCKED: 로그인 잠금\n- DORMANT: 휴면\n\n### 어드민 권한\n- MASTER: 마스터\n- NORMAL: 일반\
        \n\n### 어드민 타입\n- PLATFORM: 플랫폼 어드민\n- SERVICE: 서비스 어드민\n- PARTNER: 파트너 어드\
        민\n- SHOPBY: 샵바이 어드민\n- DEVELOPER: 개발자"
      operationId: get-mall-contracted-partner-info
      parameters:
        - name: partnerNo
          in: path
          description: 파트너 번호
          required: true
          schema:
            type: string
          example: '1'
        - name: systemKey
