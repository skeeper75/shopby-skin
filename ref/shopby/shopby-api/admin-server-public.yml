  /partners:
    post:
      tags:
        - Partner
      summary: 파트너 등록하기
      description:
        "## 부가설명 및 특이사항\n 쇼핑몰에 파트너를 등록하는 API 입니다.\n\n * 국내 파트너사에 경우에만 API로\
        \ 파트너 등록 가능합니다. 해외 파트너사는 서비스어드민을 통해서 등록하시기 바랍니다.\n * API로 파트너를 등록하는 경우 개인정\
        보 수집 및 이용 동의 절차를 진행하지 않기에 파트너사에 별도로 개인정보 수집 및 이용 동의를 받아야 합니다.\n * API로 파트너\
        \ 등록 시 입점 계약서는 '사용 안 함' 상태로 등록됩니다.\n   * 입점 계약서 사용을 원하시는 경우 파트너 등록 후 [서비스어\
        드민> 파트너관리> 파트너조회]에서 해당 파트너사의 거래쇼핑몰 '계약등록'하시면 됩니다. \n * API로 파트너 등록 시 마스터운영\
        자 휴대폰 번호는 본인인증 절차 없이 등록됩니다.\n   * 휴대폰 번호를 잘못 입력한 경우 '운영자 휴대폰 인증'이 되지 않기에 유\
        효하지 않은 휴대폰번호가 등록되는 일이 없도록 꼭 확인하시기 바랍니다.\n * 비밀번호가 공유되지 않도록 파트너 등록 후 파트너사 운\
        영자에게 비밀번호를 수정할 수 있도록 안내 부탁드립니다.\n \n \n## 참고\n 입력 항목에 대한 설명은 'API업데이트 > [신\
        규] 파트너 등록하기 API - 추가'에서 확인하실 수 있습니다. [API업데이트 게시판 바로가기 >](https://workspace.nhn-commerce.com/apiUpdate)\n\
        \  \n * merchandiserNo(담당MD) :운영자번호 번호 입력 (거래쇼핑몰 권한 + 상품MD 권한이 있는 운영자만 지정\
        \ 가능)\n   * 서비스어드민> 서비스관리> 운영자 관리에서 운영자번호 확인 가능합니다.   \n  \n * id(마스터 운영자\
        \ 어드민 아이디) : \n   * 중복불가 [어드민 아이디 중복 체크하기 API >](https://server-docs.shopby.co.kr/#/Partner/get-partners-exist-admin-id)\n\
        \   * id 시작은 소문자로시작해야 합니다.\n   * 그 뒤에는 영문 대소문자와 숫자로 구성된 4자에서 19자 사이의 문자열이\
        \ 와야 합니다.\n   * 전체 길이는 최소 5자(첫 소문자 + 4자)에서 최대 20자(첫 소문자 + 19자)입니다.\n * partnerName(파\
        트너명) : 중복불가  : [파트너명 중복 체크하기 API >](https://server-docs.shopby.co.kr/#/Partner/get-partners-exist-partner-name)\
        \  \n * bank(은행코드) : [은행코드 바로가기 >](https://workspace.nhn-commerce.com/support/recommendedContents/193355)\
        \  \n   * 은행코드를 제공하지 않는 은행인 경우 null로 입력 후 bankName(은행명)에 은행명을 기입하시기 바랍니다.\n\
        \  \n * bankName(은행명) :\n   * bank(은행코드)에 은행코드를 입력한 경우 null로 입력\n   * bank(은\
        행코드) null로 입력한 경우 은행명 입력\n   \n * 이메일 유효성 검사 조건\n   * 로컬 파트(@ 앞쪽): 허용되는 특수\
        \ 문자(.!#-'*+/-9=?A-Z^-~), 대문자, 숫자 등을 포함하는 0에서 64자 길이의 문자열.\n   * 도메인 파트(@\
        \ 뒤쪽): 첫 글자는 영문자나 숫자로 시작하고, 중간에 하이픈을 포함할 수 있으며, 최대 63자 길이의 도메인 라벨.\n   * ex)\
        \ test@example.com, john.doe\"@example.com, user.name+tag@sub.domain.com\n\
        \n * 전화번호 유효성 검사 조건\n   * 숫자 2-4자리, 하이픈, 숫자 3-5자리, 하이픈, 숫자 4자리 (예: 123-456-7890)\n\
        \   * 숫자 4자리, 하이픈, 숫자 4자리 (예: 1234-5678)\n   * 숫자 8-12자리 연속된 숫자 (예: 12345678,\
        \ 123456789012)\n \n #### 과세형태\n - NORMAL: 일반과세자\n- SIMPLE: 간이과세자\n- VAT_FREE:\
        \ 부가세 면세사업자\n- CORPORATION: 법인사업자\n- FREE_CORPORATION: 면세법인사업자\n- ETC: 기타\n\
        \ \n #### 정산 유형\n - DAY: 일 정산\n- WEEK: 주 정산\n- MONTH: 월 정산\n \n #### 정산 타입\
        \n - TOMORROW: 전일\n- YESTERDAY: 익일\n "
      operationId: post-partners
      parameters:
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
