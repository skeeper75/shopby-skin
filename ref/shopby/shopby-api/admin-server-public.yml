openapi: 3.0.1
info:
  title: admin-server
  description: |2-
     server API란? 외부 시스템에서 shop by와 연동하는 등 shop by서버에 저장된 데이터를 또 따른 서버에서 호출할 때 사용할 수 있는 API입니다.
     기본 정보 관리(admin) 관련 server API입니다.
  version: '1.0'
servers:
  - url: https://server-api.e-ncp.com
tags:
  - name: Partner
    description: 파트너
paths:
  /admins:
    get:
      tags:
        - Admin
      summary: 샵바이 어드민 권한 조회
      description: |-
        샵바이에 등록된 어드민의 권한 정보를 조회한다.
        MASTER 어드민일 경우 권한이 존재하지 않습니다.
        MASTER 어드민을 조회 할 경우 권한그룹: "", 개인정보 권한: true 로 응답됩니다.

        Authorization 은 필수값입니다.
      operationId: get-admins-authority
      parameters:
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n"
          required: false
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br>\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br>\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br>\n\n "
          required: false
          schema:
            type: string
          example: 각 어드민에서 복사된 값
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admins1091512367'
              examples:
                get-admins-authority:
                  value: |-
                    {
                      "authorityGroupName" : "권한그룹명",
                      "permitsPrivateInformation" : false
                    }
  /admins/merchandisers:
    get:
      tags:
        - Admin
      summary: 쇼핑몰 상품담당 MD 운영자 조회
      description: |
        특정 쇼핑몰의 상품담당 MD 운영자를 조회하는 API 입니다.
      operationId: get-md-admins
      parameters:
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n"
          required: false
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br>\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br>\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br>\n\n "
          required: false
          schema:
            type: string
          example: 각 어드민에서 복사된 값
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admins-merchandisers-1458267913'
              examples:
                get-md-admins:
                  value: |-
                    [ {
                      "adminNo" : 1,
                      "name" : "test",
                      "id" : "test"
                    }, {
                      "adminNo" : 2,
                      "name" : "test2",
                      "id" : "test2"
                    } ]
  /admins/{adminNo}:
    get:
      tags:
        - Admin
      summary: 샵바이 어드민 조회
      description: |-
        ### 어드민 상태
        - WAITING: 등록대기
        - INVESTIGATION: 검토중
        - ACTIVE: 등록완료
        - DELETE: 삭제
        - LOCKED: 로그인 잠금
        - DORMANT: 휴면

        ### 어드민 권한
        - MASTER: 마스터
        - NORMAL: 일반

        ### 어드민 타입
        - PLATFORM: 플랫폼 어드민
        - SERVICE: 서비스 어드민
        - PARTNER: 파트너 어드민
        - SHOPBY: 샵바이 어드민
        - DEVELOPER: 개발자

        샵바이에 등록된 어드민 정보를 조회한다.
      operationId: get-admins
      parameters:
        - name: adminNo
          in: path
          description: 어드민 번호
          required: true
          schema:
            type: string
          example: '1'
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n"
          required: false
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br>\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br>\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br>\n\n "
          required: false
          schema:
            type: string
          example: 각 어드민에서 복사된 값
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admins-adminNo933950945'
              examples:
                get-admins:
                  value: |-
                    {
                      "adminNo" : 1,
                      "adminName" : "test",
                      "adminId" : "test",
                      "jobPositionName" : "",
                      "departmentName" : "",
                      "jobDutyName" : "",
                      "email" : "nhn@nhncommerce.com",
                      "phoneNo" : "010-1111-1111",
                      "mobileNo" : "010-1111-1111",
                      "externalAccessEnabled" : false,
                      "permittedIpAddresses" : [ ],
                      "phoneCertificationYn" : false,
                      "expireDateTime" : null,
                      "adminStatus" : "ACTIVE",
                      "adminType" : "SERVICE",
                      "adminRole" : "MASTER",
                      "serviceNo" : 3,
                      "partnerNo" : null
                    }
  /configurations/admin/domains:
    get:
      tags:
        - Mall-Domain
      summary: 몰 도메인 조회
      description: |
        ### 몰 도메인 정보를 조회 합니다.
      operationId: get-mall-domains
      parameters:
        - name: deviceType
          in: query
          description: 디바이스 타입. 없으면 전체검색 (PC / MOBILE)
          required: false
          schema:
            type: string
          example: PC
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n"
          required: false
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br>\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br>\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br>\n\n "
          required: false
          schema:
            type: string
          example: 각 어드민에서 복사된 값
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/configurations-admin-domains1790762806'
              examples:
                get-mall-domains:
                  value: |-
                    [ {
                      "mallNo" : 1,
                      "mallId" : "abc",
                      "domain" : "abc.com",
                      "deviceType" : "PC",
                      "ssl" : true
                    } ]
  /contracts:
    get:
      tags:
        - Contract
      summary: 계약서 조회하기
      description:
        "계약서를 조회한다.\n\n #### 정산 유형\n - DAY: 일 정산\n- WEEK: 주 정산\n- MONTH:\
        \ 월 정산\n \n #### 정산 타입\n - TOMORROW: 전일\n- YESTERDAY: 익일\n \n #### 정산요일\n\
        \ [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]\n "
      operationId: get-contract-list
      parameters:
        - name: page
          in: query
          description: 페이지 번호
          required: false
          schema:
            type: number
          example: '1'
        - name: pageSize
          in: query
          description: 페이지 사이즈
          required: false
          schema:
            type: number
          example: '10'
        - name: partnerNos
          in: query
          description: '파트너 번호들(미입력 시, 전체 조회)'
          required: false
          schema:
            type: string
          example: '[1, 2, 3]'
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n"
          required: false
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br>\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br>\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br>\n\n "
          required: false
          schema:
            type: string
          example: 각 어드민에서 복사된 값
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/contracts-1572845133'
              examples:
                get-contract-list:
                  value: |-
                    {
                      "totalCount" : 1,
                      "contents" : [ {
                        "contractNo" : 1,
                        "mallNo" : 1,
                        "partnerNo" : 1,
                        "merchandiserNo" : 1,
                        "commissionRate" : 0,
                        "memo" : null,
                        "contractType" : null,
                        "promotionAgreed" : false,
                        "status" : "ACTIVE",
                        "additionalInfo" : "{\"key\": \"value\"}",
                        "settlementConfig" : {
                          "settlementPeriodType" : "MONTH",
                          "domesticProvisionRate" : 100,
                          "domesticSettlementDay" : 5,
                          "domesticSettlementHolidayType" : "YESTERDAY",
                          "domesticSettlementDayOfWeek" : "FRIDAY",
                          "overseasProvisionRate" : 100,
                          "overseasSettlementDay" : 5,
                          "overseasSettlementHolidayType" : "YESTERDAY",
                          "overseasSettlementDayOfWeek" : "MONDAY"
                        }
                      } ]
                    }
    put:
      tags:
        - Contract
      summary: 계약서 상태 수정하기
      description:
        "몰과 파트너간의 계약 상태를 수정한다.\n\n #### 계약 상태\n - APPROVAL: 계약 동의\n- DISAPPROVAL:\
        \ 계약 반려\n- SUSPEND: 계약 일시정지\n- UNSUSPEND: 계약 일시정지 해제\n "
      operationId: put-contract-status
      parameters:
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n"
          required: false
          schema:
            type: string
          example: Bearer ABCDERAdjflaskjdfosiaetlkfs
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br>\n\n Authorization을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br>\n\n (Authorization 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br>\n\n "
          required: false
          schema:
            type: string
          example: 각 어드민에서 복사된 값
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/contracts-925074272'
            examples:
              put-contract-status:
                value: |-
                  {
                    "status" : "APPROVAL",
                    "contractNos" : [ 1, 2 ]
                  }
      responses:
        '204':
          description: '204'
    post:
      tags:
        - Contract
      summary: 신규 계약 등록하기
      description:
        "\n등록되어있는 파트너와 신규 계약을 등록한다.\n이미 쇼핑몰 - 파트너간 계약관계가 존재한다면 새로 등록할 수\
        \ 없다.\n\n- memo 는 필수값이 아님\n- contractContent는 입점계약서를 사용할 경우 필수\n\n #### 정산\
        \ 유형\n - DAY: 일 정산\n- WEEK: 주 정산\n- MONTH: 월 정산\n \n #### 정산 타입\n - TOMORROW:\
        \ 전일\n- YESTERDAY: 익일\n \n #### 정산요일\n [MONDAY, TUESDAY, WEDNESDAY, THURSDAY,\
        \ FRIDAY, SATURDAY, SUNDAY]\n "
      operationId: post-new-contract
      parameters:
        - name: systemKey
          in: header
          description:
            "\n 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n - 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n - 앱 기준으로 systemKey 발급됨\n"
          required: true
          schema:
            type: string
          example: test-system-key
        - name: Authorization
          in: header
          description:
            "\n \n 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n - 형식: Bearer {access_token}\
            \ (중간에 띄어쓰기 필수입니다.)\n\n - 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n"
          required: false
          schema:
            type: string
