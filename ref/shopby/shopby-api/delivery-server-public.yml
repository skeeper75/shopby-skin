         ## 부가설명 및 특이사항
         파트너의 지역별 추가배송비 설정 내역을 조회합니다.
      operationId: get-areafees
      parameters:
        - name: page
          in: query
          description: '시작 번호[페이징 처리] (1 이상)^|1'
          required: true
          schema:
            type: number
        - name: size
          in: query
          description: '종료 번호[페이징 처리]^|30'
          required: true
          schema:
            type: number
        - name: systemKey
          in: header
          description:
            " 시스템 키 (외부시스템 연동을 위한 server API 호출 키)\n \n- 발급경로: 워크스페이스> 셀러\
            어드민> 신규 앱(App) 등록 시 수정페이지에서 확인가능 \n- 앱 기준으로 systemKey 발급됨\n^|test-system-key"
          required: true
          schema:
            type: string
          example: SABANGNET
        - name: Authorization
          in: header
          description:
            " 인증토큰 (Bearer 발급받은 엑세스 토큰)\n \n- 형식: Bearer {access_token} (중\
            간에 띄어쓰기 필수입니다.)\n- 발급경로: POST /auth/token 또는 POST /auth/token/long-lived\
            \ 의 응답 값으로 내려온 access_token\n^|Bearer ABCDERAdjflaskjdfosiaetlkfs"
          required: false
          schema:
            type: string
        - name: mallKey
          in: header
          description:
            " 외부 API 연동키 (외부시스템연동 코드)\n \n ※ server API 호출하는 기존 방식으로, 향후\
            \ fade out될 수 있습니다.<br />\n Authorization을을 입력을 통한 serverAPI 호출방식 권장드립니다\
            .<br />\n Authorization을 입력했을 경우, mallKey는 null로 보내시길 바랍니다.)<br />\n ^|각\
            \ 어드민에서 복사된 값"
          required: false
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/areafees-82223564'
              examples:
                get-areafees:
                  value: "{\"totalCount\":2,\"contents\":[{\"areaFeeNo\":1,\"name\"\
