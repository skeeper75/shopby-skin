openapi: 3.0.1
info:
  title: delivery-server
  description: ' 배송(delivery)관련 server API입니다.'
  version: '1.0'
servers:
  - url: https://server-api.e-ncp.com
tags:
  - name: Delivery
    description: 배송
  - name: AreaFee
    description: 지역별 추가배송비
  - name: Warehouse
    description: 입출고 주소
paths:
  /areafees:
