              description: 배송비^|2500
            totalAdditionalDiscountAmt:
              type: number
              description: 'additionalDiscountAmt[추가할인가] * orderCnt[구매수량]^|2500'
            availableMaxAccumulationAmt:
              type: number
              description: 최대 사용가능한 적립금^|0
            accumulationAmt:
              type: number
              description: 보유한 적립금^|0
