openapi: 3.0.1
info:
  title: order-shop
  description: ' 주문(order) 관련 shop API입니다.'
  version: 0.1.0-SNAPSHOT
servers:
  - url: https://shop-api.e-ncp.com
tags:
  - name: Cart
    description: 장바구니
  - name: GuestOrder
    description: 비회원 주문
  - name: OrderConfiguration
    description: 주문 설정 값
  - name: OrderSheet
    description: 주문서
  - name: Purchase
    description: 주문
  - name: NaverPay
    description: 네이버페이
  - name: MyOrder
    description: 내 주문
  - name: ShippingAddress
    description: 배송지
  - name: RecurringPayment
    description: 정기결제
  - name: LaterShippingInput
    description: 나중 입력 배송
  - name: UnidentifiedDepositors
    description: 미확인 입금자
  - name: Wish
    description: 위시리스트 (찜하기)
  - name: MyPay
    description: 마이페이
paths:
  /app-card/cards:
    get:
      tags:
        - AppCard
      summary: '[개발중] 앱카드 간편결제 카드사 목록 조회'
      description: |2-

        ## 부가설명 및 특이사항
        쇼핑몰에서 사용할 수 있는 앱카드 카드사 목록을 조회한다.
      operationId: get-app-card-cards
      parameters:
        - name: cardCode
          in: query
          description: 특정 카드사^|2088
          required: false
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: test-client-id
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: PC
        - name: language
          in: header
          description: '언어 (기본 값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app-card-cards1239894424'
              examples:
                get-app-card-cards:
                  value: "{\"cards\":[{\"cardCode\":\"2088\",\"cardName\":\"신한카드\"\
                    }]}"
  /app-card/inst-plan:
    get:
      tags:
        - AppCard
      summary: '[개발중] 앱카드 할부정보 조회'
      description: |2-

        ## 부가설명 및 특이사항
        쇼핑몰의 앱카드 할부정보를 조회한다.
      operationId: get-app-card-inst-plan
      parameters:
        - name: amount
          in: query
          description: 상품금액^|50000
          required: false
          schema:
            type: number
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: test-client-id
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: PC
        - name: language
          in: header
          description: '언어 (기본 값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app-card-inst-plan1540047407'
              examples:
                get-app-card-inst-plan:
                  value: "{\"pg\":\"KGI\",\"instInfo\":[{\"cardCode\":\"2004\",\"\
                    freeInstMin\":0,\"freeInstList\":[1,2,3],\"instMin\":50000,\"\
                    instList\":[1,2,3]}]}"
  /app-card/pay-cards:
    get:
      tags:
        - AppCard
      summary: '[개발중] 앱카드 간편결제카드 목록 조회'
      description: |2-

        ## 부가설명 및 특이사항
        앱카드 회원의 간편결제카드 목록을 조회한다.
      operationId: get-app-card-pay-cards
      parameters:
        - name: cardCode
          in: query
          description: 특정 카드사^|2088
          required: false
          schema:
            type: string
        - name: amount
          in: query
          description: 상품금액^|50000
          required: false
          schema:
            type: number
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: test-client-id
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: PC
        - name: language
          in: header
          description: '언어 (기본 값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
        - name: accessToken
          in: header
          description: 회원 엑세스 토큰^|test-access-token
          required: false
          schema:
            type: string
          example: test-access-token
        - name: Shop-By-Authorization
          in: header
          description: 액세스 토큰(Oauth2 스펙)^|Bearer test-access-token
          required: false
          schema:
            type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app-card-pay-cards-946465379'
              examples:
                get-app-card-pay-cards:
                  value: "{\"oneClickOnOff\":\"OFF\",\"uiType\":\"N\",\"listCount\"\
                    :2,\"cards\":[{\"cardBrandName\":\"test-card-brand-name\",\"cardNumMask\"\
                    :\"1234********567*\",\"acntId\":\"123412341234\",\"cardCode\"\
                    :\"2088\",\"cardName\":\"신한카드\",\"userNameMask\":\"홍*동\",\"userNo\"\
                    :\"T567856785678\",\"installmentYn\":\"Y\",\"oneClickYn\":\"N\"\
                    ,\"bcCardYN\":\"N\",\"imgUrl\":\"test-img-url\",\"cardCI\":{\"\
                    cardLogoUrl\":\"test-card-logo-url\",\"cardColorHex\":\"766B61\"\
                    ,\"cardFontHex\":\"FFFFFF\",\"instFontHex\":\"F2F3F5\"},\"freeInstMin\"\
                    :0,\"freeInstList\":[1,2,3],\"instMin\":50000,\"instList\":[1,2,3]}]}"
  /app-card/auth/{orderNo}:
    get:
      tags:
        - AppCard
      summary: '[개발중] 앱카드 인증결과 조회'
      description: |2-

        ## 부가설명 및 특이사항
        해당 주문번호의 앱카드 인증 여부를 조회한다.
      operationId: get-app-card-auth-order-no
      parameters:
        - name: orderNo
          in: path
          description: 주문번호^|test-order-no
          required: true
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: test-client-id
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: PC
        - name: language
          in: header
          description: '언어 (기본 값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
        - name: accessToken
          in: header
          description: 회원 엑세스 토큰^|test-access-token
          required: false
          schema:
            type: string
          example: test-access-token
        - name: Shop-By-Authorization
          in: header
          description: 액세스 토큰(Oauth2 스펙)^|Bearer test-access-token
          required: false
          schema:
            type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app-card-auth-orderNo-1770967382'
              examples:
                get-app-card-auth-order-no:
                  value: "{\"ci\":\"test-ci\",\"di\":\"test-di\",\"birthDate\":\"\
                    19001231\",\"gender\":\"M\",\"nation\":\"0\",\"name\":\"홍길동\"\
                    ,\"phoneNo\":\"01012345678\",\"email\":\"test@nhn-commerce.com\"\
                    ,\"acntId\":\"123412341234\",\"userNo\":\"T567856785678\"}"
  /app-card/pay-cards/{acntId}:
    delete:
      tags:
        - AppCard
      summary: '[개발중] 앱카드 간편결제 카드 삭제'
      description: |2-

        ## 부가설명 및 특이사항
        해당 카드 아이디와 일치하는 간편결제 카드를 삭제한다.
      operationId: delete-app-card-pay-cards-card-id
      parameters:
        - name: acntId
          in: path
          description: 간편결제 계정 아이디^|test-acnt-id
          required: true
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
