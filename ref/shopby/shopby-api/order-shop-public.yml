  /profile/previous-orders/summary:
    get:
      tags:
        - MyOrder
      summary: 마이페이지용 이전주문 수량 조회하기
      description: |-
        ## 부가설명 및 특이사항
        시작일 종료일 사이의 이전주문 수량을 조회하는 API 입니다.

        시작일과 종료일을 입력하지 않으면 최근 3개월의 이전주문 수량이 조회됩니다.
      operationId: get-profile-previous-orders-summary
      parameters:
        - name: startYmd
          in: query
          description: '조회 시작일(yyyy-MM-dd), null인 경우 3개월 전 날짜로 조회^|YYYY-MM-DD'
          required: false
          schema:
            type: string
        - name: endYmd
          in: query
          description: '조회 종료일(yyyy-MM-dd), null인 경우 오늘 날짜로 조회^|YYYY-MM-DD'
          required: false
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: test-client-id
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: PC
        - name: language
          in: header
          description: '언어 (기본 값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
        - name: accessToken
          in: header
          description: 회원 엑세스 토큰^|test-access-token
          required: false
          schema:
            type: string
          example: test-access-token
        - name: Shop-By-Authorization
          in: header
          description: 액세스 토큰(Oauth2 스펙)^|Bearer test-access-token
          required: false
          schema:
            type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/profile-previous-orders-summary-1407177678'
              examples:
                get-profile-previous-orders-summary:
                  value: '{"count":1}'
