          required:
            - accumulationAmt
            - accumulationAmtWhenBuyConfirm
            - availableMaxAccumulationAmt
            - cartAmt
            - cartCouponAmt
            - customsDuty
            - deliveryAmt
            - deliveryAmtOnDelivery
            - isAvailableAccumulation
            - minAccumulationLimit
            - minPriceLimit
            - paymentAmt
            - productAmt
            - productCouponAmt
            - remoteDeliveryAmt
            - remoteDeliveryAmtOnDelivery
            - salesTaxAmt
            - totalAdditionalDiscountAmt
            - totalImmediateDiscountAmt
            - totalStandardAmt
            - usedAccumulationAmt
          type: object
          properties:
            paymentAmt:
              type: number
              description: "paymentAmt[결제예정금액] = buyAmt[장바구니 금액] - cartCouponAmt[장\
                바구니 쿠폰할인금액] + deliveryAmt[배송비] +  remoteDeliveryAmt[지역별추가배송비] + salesTaxAmt\
                \ (- usedAccumulationAmt[사용한적립금]:OrderSheet시점에는 hidden) - 외부 결제금액\
                ^|2500"
            cartAmt:
              type: number
              description:
                "buyAmt[장바구니 금액] = totalStandardAmt[최종상품금액] - totalImmediateDiscountAmt[즉\
                시할인가] - totalAdditionalDiscountAmt[추가할인가] - productCouponAmt[상품쿠폰할\
                인금액]^|2500"
            productAmt:
              type: number
              description:
                "productAmt[상품금액] = totalStandardAmt[최종상품금액] -  totalImmediateDiscountAmt[즉\
                시할인가] - totalAdditionalDiscountAmt[추가할인가]^|2500"
            accumulationAmtWhenBuyConfirm:
              type: number
              description: 구매확정시 예상 적립금^|0
            usedAccumulationAmt:
              type: number
              description: 사용한 적립금^|0
            remoteDeliveryAmt:
              type: number
              description: 추가배송비(조건에 의해 계산되어진)^|2500
            productCouponAmt:
              type: number
              description: 상품쿠폰 할인금액(상품쿠폰 + 플러스쿠폰)^|2500
            customsDuty:
              type: number
              description: 'customs Duty [관세] (미국 몰 전용)^|0'
            totalImmediateDiscountAmt:
              type: number
              description: 'immediateDiscountAmt[즉시할인가] * orderCnt[구매수량]^|2500'
            remoteDeliveryAmtOnDelivery:
              type: number
              description: 착불 지역별 추가 배송비^|0
            cartCouponAmt:
              type: number
              description: 장바구니 쿠폰 할인금액
            minAccumulationLimit:
              type: number
              description: 적립금을 사용할 수 있는 최소 적립금 기준^|100
            minPriceLimit:
              type: number
              description: 적립금을 사용할 수 있는 최소 결제 금액 기준^|2500
            deliveryAmt:
              type: number
              description: 배송비^|2500
