            type: string
          example: PC
        - name: language
          in: header
          description: '언어 (기본 값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
        - name: accessToken
          in: header
          description: 회원 엑세스 토큰^|test-access-token
          required: false
          schema:
            type: string
          example: test-access-token
        - name: Shop-By-Authorization
          in: header
          description: 액세스 토큰(Oauth2 스펙)^|Bearer test-access-token
          required: false
          schema:
            type: string
      responses:
        '204':
          description: '204'
