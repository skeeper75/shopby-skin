  /later-input/shippings:
    get:
      tags:
        - LaterShippingInput
      summary: '[샵바이 엔터프라이즈 전용] 나중 입력 배송지 조회하기'
      description: |2-

        ## 부가설명 및 특이사항
        나중에 입력된 배송지를 조회하는 API 입니다.

        암호화 된 배송 번호 리스트(encryptedShippingNo): 선물하는 시점에 동일한 수령자 연락처를 입력한 배송번호 목록
      operationId: get-later-input-shippings
      parameters:
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: test-client-id
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: PC
        - name: language
          in: header
          description: '언어 (기본 값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
        - name: encryptedShippingNo
          in: header
          description: 암호화된 배송 번호 리스트^|UFE3Ylo2aUlkSWVuZHVGQjYyS2pZZz09
          required: true
          schema:
            type: string
          example: UFE3Ylo2aUlkSWVuZHVGQjYyS2pZZz09
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/later-input-shippings-1860205388'
              examples:
                get-later-input-shippings:
                  value: "{\"deliveryNo\":1,\"mallNo\":1,\"partnerNo\":1,\"receiverAddress\"\
                    :\"경기도 성남시 분당구 대왕판교로645번길 12\",\"receiverContact1\":\"010-0000-0000\"\
                    ,\"receiverDetailAddress\":\"16 NHN 플레이뮤지엄\",\"receiverJibunAddress\"\
                    :\"경기도 성남시 분당구 삼평동 629번지 NHN 플레이뮤지엄\",\"receiverName\":\"홍길동\"\
                    ,\"receiverZipCd\":\"13487\",\"laterInputCompleted\":false,\"\
                    deliveryMemo\":\"\",\"deliveryNos\":[1,2,3],\"partnerNos\":[1,2]}"
    put:
      tags:
        - LaterShippingInput
      summary: '[샵바이 엔터프라이즈 전용] 나중 입력 배송지 정보 수정하기'
      description: |2-

        ## 부가설명 및 특이사항
        나중에 입력된 배송지 정보를 수정하는 API 입니다.

        암호화 된 배송 번호 리스트(encryptedShippingNo): 선물하는 시점에 동일한 수령자 연락처를 입력한 배송번호

        암호화된 배송 번호 리스트(encryptedShippingNo)에 해당하는 모든 배송지를 수정합니다.
      operationId: put-later-input-shippings
      parameters:
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: test-client-id
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: PC
        - name: language
          in: header
          description: '언어 (기본 값: ko)^|ko'
          required: false
          schema:
            type: string
          example: ko
        - name: encryptedShippingNo
          in: header
          description: 암호화된 배송 번호 리스트^|UFE3Ylo2aUlkSWVuZHVGQjYyS2pZZz09
          required: true
          schema:
            type: string
          example: UFE3Ylo2aUlkSWVuZHVGQjYyS2pZZz09
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/later-input-shippings-178575596'
            examples:
              put-later-input-shippings:
                value:
                  "{\"receiverAddress\":\"경기도 성남시 분당구 대왕판교로645번길 12\",\"receiverContact1\"\
                  :\"01000000000\",\"receiverDetailAddress\":\"16 NHN 플레이뮤지엄\",\"\
                  receiverJibunAddress\":\"경기도 성남시 분당구 삼평동 629번지 NHN 플레이뮤지엄\",\"receiverCity\"\
                  :null,\"receiverState\":null,\"receiverName\":\"홍길동\",\"receiverZipCd\"\
                  :\"13487\",\"deliveryMemo\":\"문앞에 놓아주세요.\",\"receiverFirstName\"\
                  :null,\"receiverLastName\":null,\"countryCd\":null,\"receiverMobileCountryCd\"\
                  :null}"
      responses:
        '204':
          description: '204'
