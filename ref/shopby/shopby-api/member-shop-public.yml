      summary: 오픈 아이디 회원가입 처리하기 Ver1.1
      description:
        "\n## 부가설명 및 특이사항\n오픈 아이디를 사용한 회원 가입 처리입니다.\n\n간편 로그인으로 신규 가입을\
        \ 하는 회원인 경우 위 API를 호출하여 가입 완료 처리를 해야합니다.<br/>\n가입 처리시 추가적인 사용자 정보를 받을 수 있습\
        니다.<br/>\n\n카카오싱크 회원의 경우 약관은 카카오싱크 연동과 동시에 저장되기 때문에 joinTermsAgreements는 null로\
        \ 보내주시면 됩니다.\n\n## OAUTH2 참고사항 \n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n\n## Ver\
        \ 1.0\n- MemberType = [MALL: 쇼핑몰 회원, OPENID: 연동형 회원, NEOID: 간편로그인 회원]\n- MemberStatus\
        \ = [WAITING: 대기, ACTIVE: 가입완료, FREEZE or DORMANT: 휴면 , PAUSED :이용정지]\n \n\
        ## Ver 1.1\n- MemberType = [MALL: 쇼핑몰 회원, SYNC_ID: 연동형 회원, OPEN_ID: 간편로그인\
        \ 회원]\n- MemberStatus = [WAITING: 대기, ACTIVE: 가입완료, WITHDRAWN: 탈퇴, FREEZE\
        \ or DORMANT: 휴면 , PAUSED :이용정지, PENDING: 승인대기]"
      operationId: post-profile-openid
      parameters:
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.1'
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
