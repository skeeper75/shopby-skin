openapi: 3.0.1
info:
  title: member-shop
  description: ' 쇼핑몰 회원(member) 관련 shop API입니다.'
  version: '1.0'
servers:
  - url: https://shop-api.e-ncp.com
tags:
  - name: Company
    description: 법인
  - name: Profile
    description: 프로필
paths:
  /companies/business-exist:
    get:
      tags:
        - Company
      summary: 사업자회원 사업자등록번호 중복체크
      description: |2

        ## 부가설명 및 특이사항
         사업자등록번호 중복체크하는 API 입니다.
      operationId: check-duplicated-business
      parameters:
        - name: registration
          in: query
          description: 사업자등록번호 (10자리)^|1234567890
          required: true
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: PC
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: test-client-id
        - name: language
          in: header
          description: '언어 (기본값: ko)^|ko'
          required: false
          schema:
            type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/companies-business-exist-1571895320'
              examples:
                check-duplicated-business:
                  value: '{"exist":true}'
  /config/member-extra-info:
    get:
      tags:
        - Member-Config
      summary: 회원정보 추가항목 Config 조회
      description: |2-

        쇼핑몰 회원정보 추가항목 관련된 설정을 조회합니다
        * 타입종류 : 텍스트박스(TEXTBOX), 라디오버튼(RADIOBUTTON), 체크박스(CHECKBOX), 드롭다운(DROPDOWN), 이미지(IMAGE)
        * 상태종류 : 필수(REQUIRED), 사용(USED)

        ## Response

        | name                                  | type  | description             |
        | :-----------------------------------: | :---: | :---------------------- |
        | extraInfoContents                     | array | 회원정보 추가항목 목록        |
        | extraInfoNo                           | number| 항목 번호                  |
        | extraInfoName                         | string| 항목 명                   |
        | status                                | string| 사용 상태                 |
        | extraInfoType                         | string| 항목 타입                 |
        | extraInfoOptions                      | array | 옵션 목록                 |
        | extraInfoOptionNo                     | number| 옵션 번호                 |
        | extraInfoOptionName                   | string| 옵션 명                   |
        |
      operationId: get-member-extra-info-config
      parameters:
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: PC
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: test-client-id
        - name: language
          in: header
          description: '언어 (기본값: ko)^|ko'
          required: false
          schema:
            type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/config-member-extra-info495587874'
              examples:
                get-member-extra-info-config:
                  value: "{\"extraInfoContents\":[{\"extraInfoNo\":1,\"extraInfoName\"\
                    :\"항목명\",\"status\":\"USED\",\"extraInfoType\":\"DROPDOWN\",\"\
                    extraInfoOptions\":[{\"extraInfoOptionNo\":10,\"extraInfoOptionName\"\
                    :\"옵션값-1\"},{\"extraInfoOptionNo\":11,\"extraInfoOptionName\"\
                    :\"옵션값-2\"}]}]}"
  /member-grades:
    get:
      tags:
        - Member-Grade
      summary: 회원 등급 정보 조회하기
      description: |2-

        ## 부가설명 및 특이사항
         회원 등급 번호를 통해 회원 등급 정보를 조회하는 API 입니다. <br>
         회원 등급 번호 미 입력 시 쇼핑몰에 등록된 모든 회원 등급 정보를 조회합니다.
      operationId: get-member-grades
      parameters:
        - name: gradeNos
          in: query
          description: '회원 등급 번호 리스트 (미 입력 시 쇼핑몰에 등록된 모든 회원 등급 정보를 조회합니다.)^|1,2,3'
          required: false
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: PC
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: test-client-id
        - name: language
          in: header
          description: '언어 (기본값: ko)^|ko'
          required: false
          schema:
            type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/member-grades494184672'
              examples:
                get-member-grades:
                  value: "[{\"no\":0,\"label\":\"name\",\"description\":\"description\"\
                    ,\"memberGradeImageUrl\":null,\"isEvaluationExempt\":true,\"evaluationCondition\"\
                    :{\"minimumCount\":0,\"minimumPayment\":0},\"reserveAutoSupplying\"\
                    :{\"used\":false,\"amount\":0,\"type\":\"NONE\"},\"reserveBenefit\"\
                    :{\"used\":false,\"reserveRate\":0},\"couponAutoSupplying\":{\"\
                    used\":false,\"type\":\"NONE\"}}]"
  /member-groups:
    get:
      tags:
        - Member-Group
      summary: 회원 그룹 정보 조회하기
      description: |2-

        ## 부가설명 및 특이사항
         회원 그룹 번호를 통해 회원 그룹 정보를 조회하는 API 입니다. <br>
         회원 그룹 번호 미 입력 시 쇼핑몰에 등록된 모든 그룹 정보를 조회합니다.
      operationId: get-member-groups
      parameters:
        - name: groupNos
          in: query
          description: '회원 그룹 번호 리스트 (미 입력 시 쇼핑몰에 등록된 모든 그룹 정보를 조회합니다.)^|1,2,3'
          required: false
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: PC
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: test-client-id
        - name: language
          in: header
          description: '언어 (기본값: ko)^|ko'
          required: false
          schema:
            type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/member-groups-2025495528'
              examples:
                get-member-groups:
                  value: "[{\"no\":0,\"name\":\"name\",\"description\":\"description\"\
                    ,\"reserveBenefit\":{\"used\":false,\"reserveRate\":0}}]"
