          required: true
          schema:
            type: string
          example: test-client-id
        - name: language
          in: header
          description: '언어 (기본값: ko)^|ko'
          required: false
          schema:
            type: string
        - name: accessToken
          in: header
          description: 액세스 토큰^|accessToken
          required: false
