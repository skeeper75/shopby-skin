        \ 단, 만약 이미 동일한 실명으로 인증된 회원이 있을 경우(자기 자신 제외) 본인인증 정보가 갱신되지 않습니다.\n\n## OAUTH2\
        \ 참고사항 \n* [Oauth2 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/OAUTH2/post-oauth2-token)\
        \ 를 사용하여 토큰을 발급받은 경우,\n* 기존 accessToken 대신 Shop-By-Authorization 로 액세스 토큰을\
        \ 전달해야합니다.\n* ex) Shop-By-Authorization : Bearer test-access-token\n"
      operationId: post-profile-rename
      parameters:
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
