        - name: language
          in: header
          description: '언어 (기본값: ko)^|ko'
          required: false
          schema:
            type: string
        - name: accessToken
          in: header
          description: 액세스 토큰^|accessToken
          required: false
          schema:
            type: string
          example: test-access-token
        - name: Shop-By-Authorization
          in: header
          description: 액세스 토큰(Oauth2 스펙)^|Bearer test-access-token
          required: false
          schema:
            type: string
      requestBody:
