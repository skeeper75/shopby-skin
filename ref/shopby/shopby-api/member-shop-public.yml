         현재 회원이 로그인중인 경우, 엑세스 토큰을 함께 전달하면 본인을 제외하고 동일한 CI를 사용중인 회원이 있는지 확인합니다.

         휴대폰 본인인증을 사용하는 경우 여러 사용자가 동일한 CI로 회원가입할 수 없습니다.
         회원가입 / 수정 전 CI를 반드시 확인해주세요.

         요청 CI 값은 [KCP 본인인증 결과 조회하기 API](https://docs.shopby.co.kr/?url.primaryName=auth/#/KCPCertification/get-kcp-id-verification-response) Response 객체의 CI 값을 이용합니다.
         CI는 특수문자를 포함하고 있기때문에, [URL 인코딩](https://www.urlencoder.org/ko/) 을 한 뒤에 전달해야합니다.
      operationId: get-profile-ci-exists
      parameters:
        - name: ci
          in: query
          description: CI^|abcde
          required: true
          schema:
            type: string
        - name: Version
          in: header
          description: API 버전^|1.0
          required: true
          schema:
            type: string
          example: '1.0'
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, AOS, IOS)^|PC'
          required: true
          schema:
            type: string
          example: PC
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디^|test-client-id
          required: true
          schema:
            type: string
          example: test-client-id
        - name: language
          in: header
          description: '언어 (기본값: ko)^|ko'
          required: false
          schema:
            type: string
        - name: accessToken
          in: header
          description: 회원 엑세스 토큰
          required: false
          schema:
            type: string
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/profile-ci-exists768970653'
              examples:
                get-profile-ci-exists:
                  value: '{"exist":false,"status":null}'
