  /boards/{boardNo}/articles:
    get:
      tags:
        - Board
      summary: 게시글 리스트 조회하기
      description: |2

        ## 부가설명 및 특이사항
        특정 게시판(게시판 번호 기준)의 게시글 리스트를 조회하는 API 입니다.
      operationId: search-posts
      parameters:
        - name: boardNo
          in: path
          description: 조회할 게시판 번호(숫자) 또는 게시판id(문자열)
          required: true
          schema:
            type: string
          example: 1 또는 boardId
        - name: pageNumber
          in: query
          description: 페이지 번호
          required: false
          schema:
            type: integer
            format: int32
          example: '1'
        - name: pageSize
          in: query
          description: 한 페이지당 노출 수
          required: false
          schema:
            type: integer
            format: int32
          example: '1'
        - name: hasTotalCount
          in: query
          description: '목록 카운트 포함 여부(false: 미포함(default), true: 포함)'
          required: false
          schema:
            type: boolean
          example: 'false'
        - name: keyword
          in: query
          description: 검색어
          required: false
          schema:
            type: string
          example: keyword
        - name: searchType
          in: query
          description: '검색유형 (ALL: 전체, TITLE: 제목, CONTENT: 내용, WRITER: 작성자)'
          required: false
          schema:
            type: string
          example: ALL
        - name: categoryNo
          in: query
          description: 게시판 카테고리
          required: false
          schema:
            type: integer
            format: int32
          example: '1'
        - name: startYmd
          in: query
          description: '조회일 시작일(yyyy-MM-dd, default: 3개월)'
          required: false
          schema:
            type: string
          example: YYYY-MM-DD
        - name: endYmd
          in: query
          description: '조회일 종료일(yyyy-MM-dd, default: 오늘)'
          required: false
          schema:
            type: string
          example: YYYY-MM-DD
        - name: withReplied
          in: query
          description: '답글도 리스트에 같이 조회할지 여부 (false: 답글 미포함(default), true: 답글 포함)'
          required: false
          schema:
            type: boolean
          example: 'false'
        - name: direction
          in: query
          description:
            "정렬방식(ASC: 오래된 순, DESC: 최신 순, RECOMMEND_COUNT: 추천수 많은 순, READ_COUNT:\
            \ 조회수 많은 순)"
          required: false
          schema:
            type: string
          example: DESC
        - name: isMine
          in: query
          description: '본인이 작성한 글만 조회 여부(false: 전체 조회(default), true: 본인 글만 조회)'
          required: false
          schema:
            type: boolean
          example: 'true'
        - name: myRecommendOnly
          in: query
          description: '본인이 추천한 게시글만 조회 여부(false: 전체 조회(default), true: 추천한 게시글만 조회)'
          required: false
          schema:
            type: boolean
          example: 'true'
        - name: includeRecommended
          in: query
          description:
            "본인이 해당 게시글을 추천했는지 여부(false: 본인 추천 포함x(default), true: 본인 추천\
            \ 포함)"
          required: false
          schema:
            type: boolean
          example: 'true'
        - name: isNoticed
          in: query
          description:
            "공지글 조회 여부(null: 공지+일반 게시글 전체 조회(default), false: 일반 게시글만 조회\
            , true: 공지글만 조회"
          required: false
          schema:
            type: boolean
          example: 'true'
        - name: isSecreted
          in: query
          description:
            "비밀글 조회 여부(null: 공개+비밀 게시글 전체 조회(default), false: 공개 게시글만 조회\
            , true: 비밀 게시글만 조회)"
          required: false
          schema:
            type: boolean
          example: 'true'
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디
          required: true
          schema:
            type: string
          example: test-client-id
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, IOS, AOS)'
          required: true
          schema:
            type: string
          example: PC
        - name: accessToken
          in: header
          description: 회원 엑세스 토큰
          required: false
          schema:
            type: string
          example: accessToken
        - name: language
          in: header
          description: '언어 (기본값: ko)'
          required: false
          schema:
            type: string
          example: ko
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/boards-boardNo-articles-565179227'
              examples:
                search-posts:
                  value: |-
                    {
                      "totalCount" : 1,
                      "items" : [ {
                        "articleNo" : 1,
                        "title" : "title",
                        "content" : null,
                        "imageUrl" : null,
                        "viewCnt" : 1,
                        "categoryNo" : 1,
                        "categoryLabel" : "category",
                        "registerName" : "등록자",
                        "registerYmdt" : null,
                        "registerNo" : 1,
                        "registerType" : "ADMIN",
                        "modifierName" : "변경자",
                        "modifyYmdt" : null,
                        "modifierNo" : 1,
                        "modifierType" : "ADMIN",
                        "modifiable" : false,
                        "secreted" : false,
                        "hasReplies" : false,
                        "repliedCnt" : 0,
                        "replied" : false,
                        "notice" : false,
                        "attached" : false,
                        "recommendCount" : 1,
                        "tags" : [ ],
                        "memberId" : "memberId",
                        "memberEmail" : "nhn@nhn-commerce.com",
                        "memberNickname" : "nickname",
                        "recommended" : false,
                        "reportCount" : 0,
                        "displayStatusType" : "DISPLAY",
                        "reported" : false
                      } ]
                    }
    post:
      tags:
        - Board
      summary: 게시글 작성하기
      description:
        "\n## 부가설명 및 특이사항\n게시글을 작성하는 API 입니다.\n\nimages 값은 조회 시, '게시글 상\
        세 조회 하기 API의 'attachments로 조회됩니다. \n\n첨부파일은 최대 10개까지 업로드 가능합니다.\n\n | 저장 시\
        \                    | 조회 시(게시글 상세 조회 하기 API)  | 설명           | 예시       \
