          description: 회원 엑세스 토큰
          required: false
          schema:
            type: string
          example: accessToken
        - name: language
          in: header
          description: '언어 (기본값: ko)'
          required: false
          schema:
            type: string
          example: ko
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/inquiries-1704095907'
            examples:
              add-inquiry:
                value: |-
                  {
                    "inquiryTypeNo" : 0,
                    "inquiryTitle" : "test Title",
                    "inquiryContent" : "test Content",
                    "originalFileName" : [ "test.jpg" ],
                    "uploadedFileName" : [ "테스트.jpg" ],
                    "productNo" : 12345,
                    "orderNo" : "12345",
                    "orderOptionNo" : 123499,
                    "answerSmsSendYn" : false,
                    "answerEmailSendYn" : false,
                    "email" : "test@test.com",
                    "captcha" : "string",
                    "mobileNo" : "01012341234"
                  }
      responses:
        '200':
