  /boards/posts:
    post:
      tags:
        - Board
      summary: 게시글 리스트 조회하기(버전2)
      description:
        "\n## 부가설명 및 특이사항\n특정 게시판(게시판 번호 기준) or 몰 단위의 게시글 리스트를 조회하는 API\
        \ version2 입니다.\n\nRequest Body에 boardNoOrId값을 null 보낼 시 몰 단위로 게시글 리스트를 검색\
        할 수 있습니다. \n"
      operationId: get-posts-v2
      parameters:
        - name: page
          in: query
          description: 페이지 번호 (default:1)
          required: false
          schema:
            type: integer
            format: int32
          example: '1'
        - name: pageSize
          in: query
          description: 한 페이지당 노출 수 (default:10)
          required: false
          schema:
            type: integer
            format: int32
          example: '10'
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디
          required: true
          schema:
            type: string
          example: test-client-id
        - name: platform
          in: header
          description: '클라이언트 플랫폼 (PC, MOBILE_WEB, IOS, AOS)'
          required: true
          schema:
            type: string
          example: PC
        - name: accessToken
          in: header
          description: 회원 엑세스 토큰
          required: false
          schema:
            type: string
          example: accessToken
        - name: language
          in: header
          description: '언어 (기본값: ko)'
          required: false
          schema:
            type: string
          example: ko
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/boards-posts-408790453'
            examples:
              get-posts-v2:
                value: |-
                  {
                    "boardNoOrId" : "1",
                    "keyword" : "keyword",
                    "searchType" : "TITLE",
                    "categoryNo" : null,
                    "startYmdt" : null,
                    "endYmdt" : null,
                    "direction" : "DESC",
                    "isMine" : false,
                    "myRecommendOnly" : true,
                    "memberNos" : [ 1, 2, 3 ],
                    "postSearchTags" : [ "post", "test" ],
                    "myScrapedOnly" : false,
                    "memberGroupNo" : null,
                    "isNoticed" : null,
                    "skipBlinded" : false,
                    "isSecreted" : null
                  }
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/boards-posts928791127'
              examples:
                get-posts-v2:
                  value: |-
                    {
                      "totalCount" : 1,
