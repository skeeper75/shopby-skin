      description:
        "## 부가설명 및 특이사항\n1:1 문의글 목록을 전체 검색하는 API 입니다.\n\n문의 상태 : inquiryStatus와\
        \ inqiryStatuses가 있으며, 두 개를 동시에 요청파라미터로 넣으면 그 둘을 합한 상태를 조회합니다.\n- inquiryStatus:\
        \ 하나의 1:1문의 상태에 대해서 조회 가능. \n- inquiryStatuses, 여러 개의 1:1문의 상태 조회 가능. ','로\
        \ 구분.\n- (ASKED: 레거시 호환용, ISSUED와 같다.)\n\n## 화면 예시\n<a target='_blank' href='http://image.toast.com/aaaaahb/api-description/member/inquiry/get_inquiries.png'><img\
        \ src='http://image.toast.com/aaaaahb/api-description/member/inquiry/get_inquiries.png?autox150'></a>"
      operationId: search-inquiries
      parameters:
        - name: pageNumber
          in: query
          description: 페이지 번호
          required: false
          schema:
            type: integer
            format: int32
          example: '1'
        - name: pageSize
          in: query
          description: 한 페이지당 노출 수
          required: false
          schema:
            type: integer
            format: int32
          example: '1'
        - name: hasTotalCount
          in: query
          description: '목록 카운트 포함 여부(false: 미포함(default), true: 포함)'
          required: false
          schema:
            type: boolean
          example: 'false'
        - name: inquiryTypeNo
          in: query
          description: 1:1 문의 유형 번호
          required: false
          schema:
            type: number
          example: '123'
        - name: inquiryStatus
          in: query
          description:
            "1:1 문의 상태 (ISSUED(ASKED-이전버전 호환용): 답변대기, IN_PROGRESS: 답변 진행중\
            , ANSWERED: 답변완료)"
          required: false
          schema:
            type: string
          example: ISSUED
        - name: inquiryStatuses
          in: query
          description:
            "1:1 문의 상태 복수개 지정 (ISSUED(ASKED-이전버전 호환용): 답변대기, IN_PROGRESS:\
            \ 답변 진행중, ANSWERED: 답변완료)"
          required: false
          schema:
            type: string
          example: 'ISSUED,ASKED,IN_PROGRESS,ANSWERED'
        - name: startYmd
          in: query
          description: 조회기간 시작시간
          required: false
          schema:
            type: string
          example: YYYY-MM-DD
        - name: endYmd
          in: query
          description: 조회기간 종료시간
          required: false
          schema:
            type: string
          example: YYYY-MM-DD
        - name: keyword
          in: query
          description: 검색어
          required: false
          schema:
            type: string
          example: keyword
        - name: searchType
          in: query
          description: '검색 타입 (ALL: 전체, TITLE: 제목, CONTENT: 내용)'
          required: false
          schema:
            type: string
          example: ALL
        - name: Version
          in: header
          description: API 버전
          required: true
          schema:
            type: string
          example: '1.0'
        - name: clientId
          in: header
          description: 쇼핑몰 클라이언트 아이디
          required: true
          schema:
            type: string
          example: test-client-id
        - name: platform
