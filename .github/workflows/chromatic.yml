# @MX:NOTE: [AUTO] SPEC-DS-009 Chromatic 비주얼 리그레션 파이프라인
name: 'Chromatic'

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/design-system/**'
      - '.storybook/**'

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          exitZeroOnChanges: true
          exitOnceUploaded: true
